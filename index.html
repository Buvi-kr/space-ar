<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포천아트밸리 소원 우주선</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: url('assets/new_bg.webp') center/cover no-repeat;
      background-color: #050d21;
      background-size: 110% 110%;
      overflow: hidden;
      font-family: 'Nanum Pen Script', cursive;
      user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
      animation: bgPan 60s linear infinite alternate;
    }

    @keyframes bgPan {
      0% {
        background-position: 0% 0%;
      }

      100% {
        background-position: 100% 100%;
      }
    }

    body.admin-mode {
      box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.8);
    }

    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    #main-title {
      position: absolute;
      top: 30px;
      left: 40px;
      z-index: 200;
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 40px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(255, 200, 100, 0.6);
    }

    #fullscreen-btn,
    #download-btn {
      position: absolute;
      z-index: 1000;
      padding: 10px 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      border-radius: 8px;
      font-size: 18px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    #fullscreen-btn {
      top: 25px;
      right: 25px;
      background: rgba(50, 50, 50, 0.8);
    }

    #download-btn {
      top: 25px;
      left: 25px;
      background: rgba(0, 150, 75, 0.8);
      display: none;
    }

    body.admin-mode #download-btn {
      display: block;
    }

    #admin-secret-zone {
      position: absolute;
      top: 0;
      right: 0;
      width: 150px;
      height: 150px;
      z-index: 1000;
    }

    /* ── Wish Card ─────────────────────────────────────── */
    .wish-card {
      position: absolute;
      min-width: 84px;
      max-width: 192px;
      min-height: 60px;
      max-height: 150px;
      background: rgba(10, 15, 30, 0.95);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 9px;
      pointer-events: auto;
      cursor: grab;
      will-change: transform;
      /* NO CSS transition – physics loop controls everything */
    }

    .wish-card:active {
      cursor: grabbing;
    }

    body.admin-mode .wish-card {
      cursor: pointer;
      border: 3px solid #ff4444 !important;
    }

    /* Physics handles floating; only keep departing exit */
    .wish-card.departing {
      pointer-events: none;
      transition: transform 2s ease-in, opacity 2s ease-in !important;
      transform: translate(-50%, -50%) translateY(-200vh) rotate(25deg) !important;
      opacity: 0 !important;
    }

    /* Phototime: centre spotlight – still CSS so it snaps cleanly */
    .wish-card.phototime {
      z-index: 9999 !important;
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) scale(2) !important;
      transition: left .5s cubic-bezier(.25, 1, .5, 1),
        top .5s cubic-bezier(.25, 1, .5, 1),
        transform .5s cubic-bezier(.25, 1, .5, 1) !important;
      cursor: pointer;
    }

    .wish-card img {
      max-width: 100%;
      max-height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    .speech-tail {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      z-index: 2;
    }

    .drone-base {
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 227px;
      height: 105px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 35px;
      z-index: 4;
    }

    .drone-thruster {
      width: 31px;
      height: 52px;
      border-radius: 50%;
      transform: translateY(17px);
      animation: thrusterPulse .15s infinite alternate;
    }

    @keyframes thrusterPulse {
      0% {
        transform: translateY(16px) scale(0.9);
        opacity: 0.8;
      }

      100% {
        transform: translateY(22px) scale(1.3);
        opacity: 1;
      }
    }

    /* Particle */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: particleFade 1.2s forwards ease-out;
    }

    @keyframes particleFade {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      100% {
        transform: scale(3) translateY(30px);
        opacity: 0;
      }
    }

    /* ── Launch Button ─────────────────────────────────── */
    #open-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 70px;
      font-size: 40px;
      background: rgba(20, 30, 50, 0.9);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 60px;
      cursor: pointer;
      z-index: 100;
      font-family: 'Black Han Sans', sans-serif;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 25px rgba(100, 200, 255, 0.4);
      transition: all .3s;
    }

    #open-btn:hover {
      transform: translateX(-50%) translateY(-4px) scale(1.04);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7), 0 0 40px rgba(100, 200, 255, 0.6);
    }

    /* ── Draw UI ───────────────────────────────────────── */
    #draw-ui {
      position: absolute;
      bottom: -600px;
      left: 50%;
      transform: translateX(-50%);
      width: 1000px;
      height: 520px;
      background: rgba(5, 10, 20, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.8);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: bottom .5s cubic-bezier(.2, .8, .2, 1);
      overflow: hidden;
    }

    #draw-ui.open {
      bottom: 0;
    }

    #toolbar {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 12px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-title {
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 18px;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      cursor: pointer;
      transition: transform .2s, border-color .2s;
    }

    .color-btn.active {
      transform: scale(1.3);
      border-color: #fff;
    }

    .size-btn {
      padding: 8px 16px;
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7);
      color: #ccc;
      border-radius: 8px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    .size-btn.active {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      border-color: #fff;
    }

    #main-draw-area {
      display: flex;
      flex-direction: row;
      width: 100%;
      flex: 1 1 auto;
      gap: 16px;
      margin-bottom: 16px;
      min-height: 0;
    }

    #draw-canvas {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      flex: 1 1 0;
      min-width: 0;
      min-height: 200px;
      touch-action: none;
      cursor: crosshair;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    #right-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sticker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .sticker-btn {
      font-size: 26px;
      width: 100%;
      height: 46px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      line-height: 1;
    }

    .sticker-btn.active {
      background: rgba(255, 220, 80, 0.4);
      border-color: #ffd700;
      transform: scale(1.15);
    }

    .ssize-btn {
      padding: 8px 0;
      font-size: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7);
      color: #ccc;
      border-radius: 6px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .ssize-btn.active {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
    }

    .erase-tool-btn {
      padding: 12px;
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7);
      color: #fff;
      border-radius: 8px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    #eraser-btn.active {
      background: rgba(255, 200, 100, 0.9);
      color: #000;
      border-color: #ffc864;
    }

    @media (max-width: 768px) {
      #main-draw-area {
        flex-direction: column;
      }

      #right-sidebar {
        width: 100%;
        flex: 0 0 auto;
        display: block;
      }

      #sticker-grid {
        grid-template-columns: repeat(8, 1fr);
      }
    }

    #warning-msg {
      color: #ff5555;
      font-size: 20px;
      opacity: 0;
      transition: opacity .3s;
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Black Han Sans', sans-serif;
    }

    .bottom-actions {
      display: flex;
      gap: 16px;
      position: relative;
      flex-shrink: 0;
    }

    .bottom-actions button {
      padding: 15px 35px;
      font-size: 26px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    #undo-btn {
      background: rgba(40, 100, 160, 0.8);
      color: #fff;
    }

    #cancel-btn {
      background: rgba(100, 100, 110, 0.8);
      color: #fff;
    }

    #submit-btn {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      font-size: 30px;
    }

    /* Cursor marker */
    #cursor-marker {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      opacity: 0;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width .1s, height .1s, background-color .1s;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      display: none;
    }

    /* Phototime FX */
    #phototime-fx {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150vw;
      height: 150vw;
      pointer-events: none;
      opacity: 0;
      transition: opacity .5s;
      z-index: 9998;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 230, .5) 0%, rgba(255, 220, 100, .2) 20%, transparent 60%),
        conic-gradient(from 0deg at 50% 50%,
          transparent 0deg, rgba(255, 255, 255, .3) 45deg,
          transparent 90deg, rgba(255, 255, 255, .3) 135deg,
          transparent 180deg, rgba(255, 255, 255, .3) 225deg,
          transparent 270deg, rgba(255, 255, 255, .3) 315deg,
          transparent 360deg);
      mix-blend-mode: screen;
      will-change: opacity, transform;
    }

    #phototime-fx.active {
      opacity: 1;
      animation: spotlightSpin 15s linear infinite;
    }

    @keyframes spotlightSpin {
      0% {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      100% {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    /* Drag highlight */
    .wish-card.dragging-active {
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.6) !important;
      z-index: 500 !important;
    }
  </style>
</head>

<body oncontextmenu="return false;">
  <div id="scene"></div>
  <div id="phototime-fx"></div>

  <button id="download-btn">💾 원본 다운로드</button>
  <div id="main-title">포천 아트밸리 소원 우주선</div>
  <button id="fullscreen-btn">🖥️ 전체화면 시작</button>
  <button id="open-btn">소원 적어 보내기! 🚀</button>
  <div id="admin-secret-zone"></div>
  <div id="cursor-marker"></div>

  <div id="draw-ui">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-title">빛깔</span>
        <button class="color-btn active" style="background:#ffffff" data-color="#ffffff"></button>
        <button class="color-btn" style="background:#ff00ea" data-color="#ff00ea"></button>
        <button class="color-btn" style="background:#00d2ff" data-color="#00d2ff"></button>
        <button class="color-btn" style="background:#39ff14" data-color="#39ff14"></button>
        <button class="color-btn" style="background:#ffeb3b" data-color="#ffeb3b"></button>
        <button class="color-btn" style="background:#ff6b35" data-color="#ff6b35"></button>
      </div>
      <div class="tool-group" style="margin-left:auto;">
        <span class="tool-title">글자 굵기</span>
        <button class="size-btn" data-size="1.8">얇게</button>
        <button class="size-btn active" data-size="4.0">보통</button>
        <button class="size-btn" data-size="8.0">굵게</button>
      </div>
    </div>

    <div id="main-draw-area">
      <canvas id="draw-canvas"></canvas>
      <div id="right-sidebar">
        <span class="tool-title" style="display:block;margin-bottom:8px;">스티커 크기</span>
        <div style="display:flex;gap:6px;margin-bottom:12px;">
          <button class="ssize-btn" data-ssize="30">소</button>
          <button class="ssize-btn active" data-ssize="50">중</button>
          <button class="ssize-btn" data-ssize="80">대</button>
        </div>
        <div id="sticker-grid">
          <button class="sticker-btn" data-emoji="⭐">⭐</button>
          <button class="sticker-btn" data-emoji="🌙">🌙</button>
          <button class="sticker-btn" data-emoji="🚀">🚀</button>
          <button class="sticker-btn" data-emoji="🪐">🪐</button>
          <button class="sticker-btn" data-emoji="🛸">🛸</button>
          <button class="sticker-btn" data-emoji="🌍">🌍</button>
          <button class="sticker-btn" data-emoji="🛰️">🛰️</button>
          <button class="sticker-btn" data-emoji="✨">✨</button>
        </div>
        <hr style="width:100%;border:0;border-top:1px solid rgba(255,255,255,0.2);margin:12px 0;">
        <span class="tool-title" style="display:block;margin-bottom:8px;">지우기 도구</span>
        <div style="display:flex;gap:8px;">
          <button id="eraser-btn" class="erase-tool-btn">🧹 지우개</button>
          <button id="clear-btn" class="erase-tool-btn" style="background:rgba(255,100,100,0.4);">🗑️ 모두 싹</button>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <div id="warning-msg">소원을 먼저 그려야 우주로 보낼 수 있습니다!</div>
      <button id="undo-btn">↩️ 되돌리기</button>
      <button id="cancel-btn">접기</button>
      <button id="submit-btn">우주로 발사 ✨</button>
    </div>
  </div>

  <script>
    /* ============================================================
       1. UTILITY UI
       ============================================================ */
    document.getElementById('download-btn').addEventListener('click', () => {
      const clone = document.documentElement.cloneNode(true);
      clone.querySelector('#scene').innerHTML = '';
      clone.querySelector('body').classList.remove('admin-mode');
      clone.querySelector('#draw-ui').classList.remove('open');
      const blob = new Blob(['<!DOCTYPE html>\n<html lang="ko">\n' + clone.innerHTML + '\n</html>'], { type: 'text/html;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'artvalley_wishes.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement)
        document.documentElement.requestFullscreen()
          .then(() => fsBtn.style.display = 'none')
          .catch(e => alert(e));
    });

    /* ============================================================
       2. DRAWING CANVAS
       ============================================================ */
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const cursorMarker = document.getElementById('cursor-marker');
    let isDrawing = false, hasDrawn = false;
    let penColor = '#ffffff', penSize = 4.0;
    let eraserMode = false, stickerMode = false, currentSticker = '', stickerSize = 50;
    let drawHistory = [];

    function saveHistory() {
      if (drawHistory.length > 20) drawHistory.shift();
      drawHistory.push(canvas.toDataURL());
    }

    document.getElementById('undo-btn').addEventListener('click', () => {
      resetIdleTimer();
      if (drawHistory.length > 0) {
        const img = new Image();
        img.src = drawHistory.pop();
        img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false;
      }
    });

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const W = Math.round(rect.width), H = Math.round(rect.height);
      if (canvas.width !== W || canvas.height !== H) {
        const tmpData = canvas.toDataURL();
        canvas.width = W; canvas.height = H;
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0); applyCtxStyle(); };
        img.src = tmpData;
      }
    }

    function applyCtxStyle() {
      ctx.strokeStyle = eraserMode ? 'rgba(0,0,0,1)' : penColor;
      ctx.lineWidth = eraserMode ? penSize * 5 : penSize * 1.5;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.globalCompositeOperation = eraserMode ? 'destination-out' : 'source-over';
      ctx.shadowBlur = eraserMode ? 0 : 5;
      ctx.shadowColor = penColor;
      if (!stickerMode) {
        cursorMarker.style.width = ctx.lineWidth + 'px';
        cursorMarker.style.height = ctx.lineWidth + 'px';
        cursorMarker.style.backgroundColor = eraserMode ? 'rgba(255,255,255,0.7)' : penColor;
      }
    }

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); penColor = btn.dataset.color;
        eraserMode = false; stickerMode = false; cursorMarker.style.display = 'block';
        document.getElementById('eraser-btn').classList.remove('active');
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        canvas.className = ''; applyCtxStyle();
        document.getElementById('submit-btn').style.background = penColor;
        document.getElementById('draw-ui').style.borderColor = penColor;
      });
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); penSize = parseFloat(btn.dataset.size); applyCtxStyle();
      });
    });

    const eraserBtn = document.getElementById('eraser-btn');
    eraserBtn.addEventListener('click', () => {
      eraserMode = !eraserMode; stickerMode = false;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      eraserBtn.classList.toggle('active', eraserMode);
      canvas.className = eraserMode ? 'eraser-mode' : '';
      applyCtxStyle(); cursorMarker.style.display = 'block';
    });

    document.querySelectorAll('.ssize-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ssize-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); stickerSize = parseInt(btn.dataset.ssize);
      });
    });

    document.querySelectorAll('.sticker-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const same = stickerMode && currentSticker === btn.dataset.emoji;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        eraserMode = false; eraserBtn.classList.remove('active');
        if (same) {
          stickerMode = false; canvas.className = ''; cursorMarker.style.display = 'block';
        } else {
          stickerMode = true; currentSticker = btn.dataset.emoji;
          btn.classList.add('active'); canvas.className = 'sticker-mode'; cursorMarker.style.display = 'none';
        }
        applyCtxStyle();
      });
    });

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height), cx, cy };
    }

    document.addEventListener('mousemove', e => {
      if (stickerMode) return;
      cursorMarker.style.left = e.clientX + 'px'; cursorMarker.style.top = e.clientY + 'px';
    });
    document.addEventListener('touchmove', e => {
      if (stickerMode || !e.touches) return;
      cursorMarker.style.left = e.touches[0].clientX + 'px'; cursorMarker.style.top = e.touches[0].clientY + 'px';
    });

    canvas.addEventListener('mouseenter', () => { if (!stickerMode) { cursorMarker.style.opacity = '1'; cursorMarker.style.display = 'block'; } applyCtxStyle(); });
    canvas.addEventListener('mouseleave', () => cursorMarker.style.opacity = '0');

    function placeSticker(e) {
      saveHistory();
      const p = getPos(e);
      ctx.save(); ctx.globalCompositeOperation = 'source-over'; ctx.shadowBlur = 0;
      ctx.font = stickerSize + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(currentSticker, p.x, p.y); ctx.restore();
      hasDrawn = true; document.getElementById('warning-msg').style.opacity = '0';
      stickerMode = false;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      canvas.className = ''; cursorMarker.style.display = 'block'; cursorMarker.style.opacity = '1';
      applyCtxStyle();
    }

    function startDraw(e) {
      if (e.type === 'touchstart') e.preventDefault();
      resetIdleTimer();
      if (stickerMode) { placeSticker(e); return; }
      saveHistory(); isDrawing = true; applyCtxStyle();
      const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
      cursorMarker.style.opacity = '1';
    }
    function doDraw(e) {
      if (e.type === 'touchmove') e.preventDefault();
      if (stickerMode || !isDrawing) return;
      resetIdleTimer(); hasDrawn = true;
      const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
      document.getElementById('warning-msg').style.opacity = '0';
    }
    function endDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', doDraw);
    window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', doDraw, { passive: false });
    window.addEventListener('touchend', endDraw);

    document.getElementById('clear-btn').addEventListener('click', () => {
      saveHistory(); ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; resetIdleTimer();
    });

    /* ============================================================
       3. DRAW-UI OPEN / CLOSE / IDLE
       ============================================================ */
    const drawUI = document.getElementById('draw-ui');
    const openBtn = document.getElementById('open-btn');
    let idleTimer;

    function closeDrawUI() {
      drawUI.classList.remove('open');
      openBtn.style.transform = 'translateX(-50%)';
      clearTimeout(idleTimer);
      cursorMarker.style.opacity = '0';
    }
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      if (drawUI.classList.contains('open'))
        idleTimer = setTimeout(() => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drawHistory = []; hasDrawn = false; closeDrawUI();
        }, 30000);
    }

    openBtn.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height); drawHistory = []; hasDrawn = false;
      document.getElementById('warning-msg').style.opacity = '0';
      drawUI.classList.add('open');
      openBtn.style.transform = 'translate(-50%,300px)';
      resetIdleTimer();
      requestAnimationFrame(() => requestAnimationFrame(resizeCanvas));
    });
    document.getElementById('cancel-btn').addEventListener('click', closeDrawUI);
    window.addEventListener('resize', () => {
      if (drawUI.classList.contains('open')) resizeCanvas();
    });

    /* ============================================================
       4. IMAGE CROP UTILITY
       ============================================================ */
    function cropCanvas(src, padding = 30) {
      const c = src.getContext('2d'), w = src.width, h = src.height;
      const data = c.getImageData(0, 0, w, h).data;
      let minX = w, minY = h, maxX = 0, maxY = 0, drawn = false;
      for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
        if (data[(y * w + x) * 4 + 3] > 0) { drawn = true; if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
      }
      if (!drawn) return src.toDataURL('image/webp', 0.6);
      minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
      maxX = Math.min(w, maxX + padding); maxY = Math.min(h, maxY + padding);
      const cc = document.createElement('canvas');
      cc.width = maxX - minX; cc.height = maxY - minY;
      cc.getContext('2d').drawImage(src, minX, minY, cc.width, cc.height, 0, 0, cc.width, cc.height);
      return cc.toDataURL('image/webp', 0.8);
    }

    /* ============================================================
       5. PHYSICS ENGINE
       ============================================================ */
    const PHYSICS = {
      MAX_WISHES: 16,
      GRID_COLS: 4,
      GRID_ROWS: 4,
      REPULSION_R: 270,   // min comfortable distance between centers (px)
      REPULSION_K: 9000,  // repulsion force constant
      DRAG_PUSH_R: 360,   // drag-chain reaction radius
      DRAG_PUSH_K: 0.55,  // drag push impulse multiplier
      SPRING_K: 0.038, // spring-to-target stiffness
      DAMPING: 0.80,  // velocity damping per frame
      FLOAT_AMP: 9,     // floating amplitude (px)
      FLOAT_SPEED: 0.018, // floating oscillation speed
      BOUNDARY_TOP: 110,
      BOUNDARY_SIDE: 160,
      BOUNDARY_K: 0.14,  // boundary spring stiffness
      COLOR_PALETTE: ["#ff00ea", "#00d2ff", "#39ff14", "#ffeb3b", "#ff6b35", "#b15cff", "#ff5c8d", "#5cffda"],
    };

    const scene = document.getElementById('scene');
    const fxLayer = document.getElementById('phototime-fx');
    let allWishes = [];    // physics objects
    let rafId = null;
    let lastTs = 0;
    const STORAGE_KEY = 'artvalley_wishes_v2';

    /* ── Bottom safe zone (above launch button) ── */
    function bottomSafe() { return window.innerHeight - Math.max(200, window.innerHeight * 0.22); }

    /* ── 4×4 Grid: find least-populated cell ── */
    function getBestTarget() {
      const wW = window.innerWidth, wH = window.innerHeight;
      const top = PHYSICS.BOUNDARY_TOP + 30;
      const bot = bottomSafe() - 80;
      const left = PHYSICS.BOUNDARY_SIDE;
      const right = wW - PHYSICS.BOUNDARY_SIDE;
      const cellW = (right - left) / PHYSICS.GRID_COLS;
      const cellH = (bot - top) / PHYSICS.GRID_ROWS;

      // count how many non-departing wishes fall in each cell
      const grid = Array.from({ length: PHYSICS.GRID_ROWS }, () => new Array(PHYSICS.GRID_COLS).fill(0));
      allWishes.forEach(w => {
        if (w.departing) return;
        const col = Math.floor((w.targetX - left) / cellW);
        const row = Math.floor((w.targetY - top) / cellH);
        const c = Math.max(0, Math.min(PHYSICS.GRID_COLS - 1, col));
        const r = Math.max(0, Math.min(PHYSICS.GRID_ROWS - 1, row));
        grid[r][c]++;
      });

      // candidates = all cells with minimum count
      let minCount = Infinity;
      grid.forEach(row => row.forEach(v => { if (v < minCount) minCount = v; }));
      const candidates = [];
      grid.forEach((row, r) => row.forEach((v, c) => { if (v === minCount) candidates.push({ r, c }); }));

      const ch = candidates[Math.floor(Math.random() * candidates.length)];
      // center of cell + small random jitter
      const tx = left + (ch.c + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.38;
      const ty = top + (ch.r + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.38;

      return {
        x: Math.max(left, Math.min(right, tx)),
        y: Math.max(top, Math.min(bottomSafe() - 90, ty)),
      };
    }

    /* ── RAF physics loop ── */
    function physicsLoop(ts) {
      const dt = Math.min(32, ts - lastTs) / 16.67; // normalised to 60 fps
      lastTs = ts;

      const wW = window.innerWidth;
      const bot = bottomSafe();

      for (let i = 0; i < allWishes.length; i++) {
        const w = allWishes[i];
        if (w.departing || w.phototime) continue;

        w.phase += PHYSICS.FLOAT_SPEED;

        if (w.dragging) {
          // position updated by pointer handler; zero velocity
          w.vx = 0; w.vy = 0;
          continue;
        }

        /* Spring towards target */
        w.vx += (w.targetX - w.x) * PHYSICS.SPRING_K * dt;
        w.vy += (w.targetY - w.y) * PHYSICS.SPRING_K * dt;

        /* Repulsion from other cards */
        for (let j = 0; j < allWishes.length; j++) {
          if (i === j || allWishes[j].departing) continue;
          const o = allWishes[j];
          const rdx = w.x - o.x, rdy = w.y - o.y;
          const d2 = rdx * rdx + rdy * rdy;
          const minD = PHYSICS.REPULSION_R;
          if (d2 < minD * minD && d2 > 0.01) {
            const d = Math.sqrt(d2);
            const force = (PHYSICS.REPULSION_K / (d2)) * dt;
            w.vx += (rdx / d) * force;
            w.vy += (rdy / d) * force;
          }
        }

        /* Boundary springs */
        const BL = PHYSICS.BOUNDARY_SIDE, BR = wW - PHYSICS.BOUNDARY_SIDE;
        const BT = PHYSICS.BOUNDARY_TOP, BB = bot;
        const bk = PHYSICS.BOUNDARY_K * dt;
        if (w.x < BL) w.vx += (BL - w.x) * bk;
        if (w.x > BR) w.vx -= (w.x - BR) * bk;
        if (w.y < BT) w.vy += (BT - w.y) * bk;
        if (w.y > BB) w.vy -= (w.y - BB) * bk;

        /* Damping */
        w.vx *= Math.pow(PHYSICS.DAMPING, dt);
        w.vy *= Math.pow(PHYSICS.DAMPING, dt);

        /* Integrate */
        w.x += w.vx * dt;
        w.y += w.vy * dt;

        /* Apply to DOM: add floating sine offset */
        const floatY = Math.sin(w.phase) * PHYSICS.FLOAT_AMP;
        const floatR = Math.sin(w.phase * 0.7) * 1.6;
        w.el.style.left = w.x + 'px';
        w.el.style.top = (w.y + floatY) + 'px';
        w.el.style.transform = `translate(-50%,-50%) rotate(${floatR}deg)`;
      }

      rafId = requestAnimationFrame(physicsLoop);
    }

    /* Start physics loop */
    rafId = requestAnimationFrame(t => { lastTs = t; physicsLoop(t); });

    /* ============================================================
       6. WISH CARD CREATION & LAUNCH
       ============================================================ */
    function saveToLS() {
      try {
        const data = allWishes.map(w => ({ img: w.imgSrc, color: w.color, shipId: w.shipId, tx: w.targetX, ty: w.targetY }));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) { }
    }

    function loadFromLS() {
      try {
        const svd = localStorage.getItem(STORAGE_KEY);
        if (!svd) return;
        JSON.parse(svd).forEach(d => spawnCard(d, d.tx, d.ty, true));
      } catch (e) { }
    }

    /* ── Auto-crop → launch ── */
    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!hasDrawn) { document.getElementById('warning-msg').style.opacity = '1'; return; }
      const dataURL = cropCanvas(canvas, 30);
      closeDrawUI();
      launchWish(dataURL);
    });

    function launchWish(imgSrc) {
      const color = PHYSICS.COLOR_PALETTE[Math.floor(Math.random() * PHYSICS.COLOR_PALETTE.length)];
      const shipId = Math.floor(Math.random() * 3) + 1;
      const data = { img: imgSrc, color, shipId };

      /* Evict oldest if at capacity */
      if (allWishes.length >= PHYSICS.MAX_WISHES) {
        const oldest = allWishes.shift();
        evictCard(oldest);
      }

      /* Target chosen from grid (computed now, card moves there after photo-time) */
      const target = getBestTarget();
      spawnCard(data, target.x, target.y, false);
    }

    function evictCard(w) {
      w.departing = true;
      w.el.classList.add('departing');
      setTimeout(() => { try { w.el.remove(); } catch (e) { } }, 2200);
      saveToLS();
    }

    /* ── Spawn a wish card ── */
    function spawnCard(data, finalX, finalY, immediate) {
      const card = document.createElement('div');
      card.className = 'wish-card';
      card.style.border = `3px solid ${data.color}`;
      card.style.boxShadow = `0 0 10px ${data.color}80`;
      card.style.zIndex = '10';
      card.style.transition = 'none';

      card.innerHTML = `
    <div class="speech-tail" style="border-top:16px solid ${data.color};"></div>
    <img src="${data.img}" style="pointer-events:none;object-fit:contain;">
    <div class="drone-base" style="background:url('assets/ship${data.shipId}_bg.png') center/contain no-repeat;">
      <div class="drone-thruster" style="background:radial-gradient(circle,#fff 10%,${data.color} 60%,transparent 100%);"></div>
      <div class="drone-thruster" style="background:radial-gradient(circle,#fff 10%,${data.color} 60%,transparent 100%);"></div>
    </div>`;

      scene.appendChild(card);

      /* Physics state object */
      const w = {
        el: card,
        x: immediate ? finalX : window.innerWidth / 2,
        y: immediate ? finalY : window.innerHeight / 2,
        vx: 0, vy: 0,
        targetX: finalX,
        targetY: finalY,
        phase: Math.random() * Math.PI * 2,
        dragging: false,
        phototime: false,
        departing: false,
        createdAt: Date.now(),
        imgSrc: data.img,
        color: data.color,
        shipId: data.shipId,
      };
      allWishes.push(w);
      saveToLS();

      /* Set initial DOM position */
      card.style.left = w.x + 'px';
      card.style.top = w.y + 'px';
      card.style.transform = 'translate(-50%,-50%)';

      if (immediate) {
        /* Loaded from storage – place directly */
        return;
      }

      /* ── Photo-time: stay centred 5s then fly to grid target ── */
      w.phototime = true;
      card.style.zIndex = '9999';
      card.style.transform = 'translate(-50%,-50%) scale(2)';
      fxLayer.classList.add('active');

      setTimeout(() => {
        if (!document.body.contains(card)) return;
        fxLayer.classList.remove('active');
        w.phototime = false;
        w.x = window.innerWidth / 2;
        w.y = window.innerHeight / 2;
        w.vx = (Math.random() - 0.5) * 4;
        w.vy = (Math.random() - 0.5) * 4;
        card.style.zIndex = '10';
        card.style.transform = 'translate(-50%,-50%)';
      }, 5000);

      /* ── Click: toggle photo-time spotlight ── */
      card.addEventListener('click', e => {
        if (isAdminMode) {
          allWishes = allWishes.filter(x => x !== w);
          evictCard(w);
          return;
        }
        if (w.dragging) return;
        w.phototime = !w.phototime;
        if (w.phototime) {
          card.classList.add('phototime');
          fxLayer.classList.add('active');
          setTimeout(() => {
            if (w.phototime) {
              w.phototime = false;
              card.classList.remove('phototime');
              fxLayer.classList.remove('active');
              /* Restore position to physics */
              w.x = finalX; w.y = finalY;
              card.style.zIndex = '10';
            }
          }, 5000);
        } else {
          card.classList.remove('phototime');
          fxLayer.classList.remove('active');
          w.x = parseFloat(card.style.left) || finalX;
          w.y = parseFloat(card.style.top) || finalY;
          card.style.zIndex = '10';
        }
      });

      /* ── Drag: move card + push neighbours ── */
      attachDrag(card, w);
    }

    /* ============================================================
       7. DRAG WITH CHAIN-REACTION REPULSION
       ============================================================ */
    function attachDrag(card, w) {
      let startPX = 0, startPY = 0, startWX = 0, startWY = 0, didDrag = false;

      function onDown(e) {
        if (isAdminMode || w.phototime || w.departing) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        startPX = cx; startPY = cy; startWX = w.x; startWY = w.y; didDrag = false;
        w.dragging = true;
        card.classList.add('dragging-active');
        card.style.zIndex = '500';
        e.stopPropagation();
      }

      function onMove(e) {
        if (!w.dragging) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = cx - startPX, dy = cy - startPY;
        if (Math.abs(dx) + Math.abs(dy) > 4) didDrag = true;
        w.x = startWX + dx;
        w.y = startWY + dy;
        card.style.left = w.x + 'px';
        card.style.top = w.y + 'px';
        card.style.transform = 'translate(-50%,-50%) scale(1.06)';

        /* Push nearby cards (chain repulsion) */
        allWishes.forEach(other => {
          if (other === w || other.dragging || other.departing || other.phototime) return;
          const odx = other.x - w.x, ody = other.y - w.y;
          const d2 = odx * odx + ody * ody;
          const pr = PHYSICS.DRAG_PUSH_R;
          if (d2 < pr * pr && d2 > 0.1) {
            const d = Math.sqrt(d2);
            const push = (pr - d) * PHYSICS.DRAG_PUSH_K;
            other.vx += (odx / d) * push;
            other.vy += (ody / d) * push;
          }
        });
      }

      function onUp() {
        if (!w.dragging) return;
        w.dragging = false;
        card.classList.remove('dragging-active');
        card.style.zIndex = '10';
        /* Update resting target so physics spring stays here */
        w.targetX = w.x;
        w.targetY = w.y;
        /* Small bounce impulse */
        w.vx = (Math.random() - 0.5) * 2;
        w.vy = (Math.random() - 0.5) * 2;
        saveToLS();
      }

      card.addEventListener('mousedown', onDown, { passive: false });
      card.addEventListener('touchstart', onDown, { passive: true });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchend', onUp);
    }

    /* ============================================================
       8. INIT
       ============================================================ */
    loadFromLS();

    /* ── Admin mode ── */
    let adminClicks = 0, adminTimer, isAdminMode = false;
    document.getElementById('admin-secret-zone').addEventListener('click', () => {
      adminClicks++; clearTimeout(adminTimer);
      adminTimer = setTimeout(() => adminClicks = 0, 2000);
      if (adminClicks >= 5) {
        isAdminMode = !isAdminMode; adminClicks = 0;
        document.body.classList.toggle('admin-mode', isAdminMode);
        alert(isAdminMode
          ? '⚠️ [관리자 모드 켜짐]\n소원 카드를 터치해 삭제하세요.'
          : '✅ [관리자 모드 꺼짐]');
      }
    });
  </script>
</body>
