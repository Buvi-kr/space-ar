<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포천 아트밸리 소원 우주선 (V11 최종 레이어 및 태양 수정)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: url('assets/bg.webp') center/cover no-repeat, radial-gradient(circle at 50% 50%, #050d21 0%, #010205 100%);
      overflow: hidden;
      font-family: 'Nanum Pen Script', cursive;
      user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
      perspective: 1200px;
    }

    body.admin-mode {
      box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.8);
    }

    #stars-canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* 1️⃣ 레이어 맨 아래: 지표면 (z-index: 2) */
    #earth-ground {
      position: absolute;
      bottom: calc(-110vh + 100px);
      left: -20vw;
      width: 140vw;
      height: 110vh;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 15%, rgba(15, 25, 45, 0.8) 0%, rgba(5, 10, 20, 0.9) 50%, #000 100%);
      box-shadow: inset 0 30px 80px rgba(0, 0, 0, 0.8), 0 -30px 100px rgba(0, 0, 0, 0.9);
      z-index: 2;
      /* 궤도와 태양보다 무조건 뒤로 가도록 설정 */
    }

    #earth-ground::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 40%), radial-gradient(ellipse at 70% 25%, rgba(255, 255, 255, 0.08) 0%, transparent 35%);
    }

    /* 2️⃣ 레이어 중간: 우주선 궤도 (z-index: 5) */
    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
      transform-style: preserve-3d;
      transform: rotateX(-5deg);
    }

    /* 3️⃣ 레이어 맨 위: 태양 (z-index: 100) + 한가운데 배치 */
    #core-sun {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* 화면 완벽한 정중앙 */
      width: 500px;
      height: 500px;
      border-radius: 50%;

      background: url('assets/sun.webp') center/cover no-repeat;

      box-shadow: 0 0 150px rgba(255, 120, 0, 0.7), 0 0 350px rgba(255, 80, 0, 0.5);
      animation: sunPulse 4s infinite alternate;
      z-index: 100;
      /* 맨 위로 덮음 */
      pointer-events: none;
    }

    @keyframes sunPulse {
      0% {
        transform: translate(-50%, -50%) scale(0.98) rotate(0deg);
        box-shadow: 0 0 120px rgba(255, 120, 0, 0.7), 0 0 250px rgba(255, 80, 0, 0.5);
      }

      100% {
        transform: translate(-50%, -50%) scale(1.03) rotate(2deg);
        box-shadow: 0 0 200px rgba(255, 150, 0, 1), 0 0 450px rgba(255, 100, 0, 0.8);
      }
    }

    #main-title {
      position: absolute;
      top: 40px;
      left: 50px;
      z-index: 200;
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 50px;
      letter-spacing: 4px;
      text-shadow: 0 0 25px rgba(255, 200, 100, 0.6);
    }

    #fullscreen-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      z-index: 1000;
      padding: 12px 24px;
      background: rgba(50, 50, 50, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      border-radius: 8px;
      font-size: 20px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      transition: 0.2s;
    }

    #fullscreen-btn:hover {
      background: rgba(80, 80, 80, 0.9);
    }

    #download-btn {
      display: none;
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 1000;
      padding: 12px 24px;
      background: rgba(0, 150, 75, 0.8);
      border: 2px solid rgba(0, 200, 100, 0.5);
      color: #fff;
      border-radius: 8px;
      font-size: 20px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      transition: 0.2s;
    }

    #download-btn:hover {
      background: rgba(0, 180, 90, 0.9);
    }

    body.admin-mode #download-btn {
      display: block;
    }

    #admin-secret-zone {
      position: absolute;
      top: 0;
      right: 0;
      width: 150px;
      height: 150px;
      z-index: 1000;
    }

    /* 💬 말풍선 소원 카드 */
    .wish-card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 320px;
      height: 180px;
      margin-left: -160px;
      margin-top: -90px;
      background: rgba(10, 15, 30, 0.6);
      border-radius: 30px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      transform-style: preserve-3d;
      pointer-events: none;
      transition: border-color 0.2s;
    }

    .wish-card img {
      max-width: 100%;
      max-height: 100%;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
      z-index: 5;
    }

    .speech-tail {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      z-index: 2;
    }

    .speech-tail-inner {
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 14px solid transparent;
      z-index: 3;
    }

    /* 🚀 분리된 하단 우주선 추진체 */
    .drone-base {
      position: absolute;
      bottom: -70px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 90px;
      background: url('assets/ship.webp') center/contain no-repeat;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 35px;
      z-index: 4;
    }

    .drone-thruster {
      width: 20px;
      height: 35px;
      border-radius: 50%;
      transform: translateY(12px);
      animation: thrusterPulse 0.15s infinite alternate;
    }

    @keyframes thrusterPulse {
      0% {
        transform: translateY(10px) scale(0.9);
        opacity: 0.8;
      }

      100% {
        transform: translateY(15px) scale(1.3);
        opacity: 1;
      }
    }

    body.admin-mode .wish-card {
      pointer-events: auto;
      cursor: pointer;
      border: 3px solid #ff4444 !important;
    }

    body.admin-mode .wish-card:hover {
      background: rgba(255, 0, 0, 0.4);
    }

    #open-btn {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      padding: 24px 80px;
      font-size: 45px;
      background: rgba(20, 30, 50, 0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 60px;
      cursor: pointer;
      z-index: 100;
      font-family: 'Black Han Sans', sans-serif;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(100, 200, 255, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #open-btn:hover {
      transform: translateX(-50%) translateY(-5px) scale(1.05);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 45px rgba(100, 200, 255, 0.6);
      background: rgba(30, 40, 70, 0.8);
    }

    #open-btn:active {
      transform: translateX(-50%) translateY(2px) scale(0.95);
    }

    #draw-ui {
      position: absolute;
      bottom: -900px;
      left: 50%;
      transform: translateX(-50%);
      width: 950px;
      background: rgba(5, 10, 20, 0.6);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-bottom: none;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -10px 60px rgba(0, 0, 0, 0.8), inset 0 2px 20px rgba(255, 255, 255, 0.1);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 35px 30px 45px;
      transition: bottom 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #draw-ui.open {
      bottom: 0;
    }

    #toolbar {
      width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding: 0 10px;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .tool-title {
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 28px;
      margin-right: 15px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .color-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .color-btn.active {
      transform: scale(1.25);
      border-color: #fff;
      box-shadow: 0 0 25px currentColor, 0 0 10px currentColor inset;
    }

    .size-btn {
      padding: 12px 24px;
      font-size: 26px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.6);
      color: #ccc;
      border-radius: 12px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(5px);
    }

    .size-btn:hover {
      background: rgba(50, 50, 60, 0.8);
      color: #fff;
    }

    .size-btn.active {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
    }

    #draw-canvas {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 16px;
      width: 800px;
      height: 450px;
      touch-action: none;
      cursor: crosshair;
      margin-bottom: 25px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #warning-msg {
      color: #ff5555;
      text-shadow: 0 0 10px #ff0000;
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
    }

    .btn-group {
      display: flex;
      gap: 30px;
      position: relative;
    }

    .btn-group button {
      padding: 20px 50px;
      font-size: 35px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(5px);
    }

    .btn-group button:active {
      transform: scale(0.93) translateY(5px);
    }

    #clear-btn {
      background: rgba(60, 60, 70, 0.8);
      color: #fff;
    }

    #clear-btn:hover {
      background: rgba(80, 80, 90, 0.9);
    }

    #cancel-btn {
      background: rgba(100, 100, 110, 0.8);
      color: #fff;
    }

    #cancel-btn:hover {
      background: rgba(120, 120, 130, 0.9);
    }

    #submit-btn {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
    }
  </style>
</head>

<body oncontextmenu="return false;">

  <canvas id="stars-canvas"></canvas>

  <div id="earth-ground"></div>
  <div id="core-sun"></div>
  <div id="scene"></div>

  <button id="download-btn">💾 원본 HTML 다운로드</button>

  <div id="main-title">포천 아트밸리 소원 우주선</div>
  <button id="fullscreen-btn">🖥️ 전체화면 시작</button>
  <button id="open-btn">소원 적어 보내기! 🚀</button>

  <div id="admin-secret-zone"></div>

  <div id="draw-ui">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-title">빛깔</span>
        <button class="color-btn active" style="background:#ffffff; color:#ffffff;" data-color="#ffffff"></button>
        <button class="color-btn" style="background:#ff00ea; color:#ff00ea;" data-color="#ff00ea"></button>
        <button class="color-btn" style="background:#00d2ff; color:#00d2ff;" data-color="#00d2ff"></button>
        <button class="color-btn" style="background:#39ff14; color:#39ff14;" data-color="#39ff14"></button>
        <button class="color-btn" style="background:#ffeb3b; color:#ffeb3b;" data-color="#ffeb3b"></button>
      </div>
      <div class="tool-group">
        <span class="tool-title">굵기</span>
        <button class="size-btn" data-size="2.4">얇게</button>
        <button class="size-btn active" data-size="5.6">보통</button>
        <button class="size-btn" data-size="11.2">굵게</button>
      </div>
    </div>

    <canvas id="draw-canvas" width="800" height="450"></canvas>

    <div class="btn-group">
      <div id="warning-msg">소원을 먼저 그려야 우주로 보낼 수 있습니다!</div>
      <button id="clear-btn">지우기</button>
      <button id="cancel-btn">접기</button>
      <button id="submit-btn">우주로 발사 ✨</button>
    </div>
  </div>

  <script>
    document.getElementById('download-btn').addEventListener('click', () => {
      const clone = document.documentElement.cloneNode(true);
      const sceneClone = clone.querySelector('#scene');
      sceneClone.querySelectorAll('.wish-card').forEach(c => c.remove());
      clone.querySelector('body').classList.remove('admin-mode');
      clone.querySelector('#fullscreen-btn').style.display = '';
      clone.querySelector('#draw-ui').classList.remove('open');
      clone.querySelector('#open-btn').style.transform = '';
      const htmlContent = "<!DOCTYPE html>\n<html lang=\"ko\">\n" + clone.innerHTML + "\n</html>";
      const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'artvalley_wish_spacecraft.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    });

    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => { fsBtn.style.display = 'none'; }).catch(e => alert(e));
      }
    });

    const scanvas = document.getElementById('stars-canvas');
    const sctx = scanvas.getContext('2d');
    let w, h, stars = [];

    window.addEventListener('resize', () => {
      w = scanvas.width = window.innerWidth; h = scanvas.height = window.innerHeight;
      stars = Array.from({ length: 150 }, () => ({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 2, speed: Math.random() * 0.1 + 0.05, twinkle: Math.random() * Math.PI * 2 }));
    });
    window.dispatchEvent(new Event('resize'));

    function drawStars() {
      sctx.clearRect(0, 0, w, h);
      stars.forEach(s => {
        s.y -= s.speed; if (s.y < 0) { s.y = h; s.x = Math.random() * w; }
        s.twinkle += 0.02; sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sctx.fillStyle = `rgba(255, 255, 255, ${0.2 + 0.8 * Math.abs(Math.sin(s.twinkle))})`; sctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false; let hasDrawn = false;
    let currentPenColor = '#ffffff'; let currentPenSize = 5.6;

    function updateContext() {
      ctx.strokeStyle = currentPenColor; ctx.lineWidth = currentPenSize;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.shadowBlur = 15; ctx.shadowColor = currentPenColor; // Neon glow effect
    }
    updateContext();

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        currentPenColor = btn.dataset.color; updateContext();
        canvas.style.borderColor = currentPenColor; canvas.style.boxShadow = `0 0 30px ${currentPenColor}80`;
        document.getElementById('submit-btn').style.background = currentPenColor; document.getElementById('submit-btn').style.boxShadow = `0 0 30px ${currentPenColor}80`;
        document.getElementById('draw-ui').style.borderColor = currentPenColor;
      });
    });
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        currentPenSize = parseFloat(btn.dataset.size); updateContext();
      });
    });

    function getPos(e) {
      const rect = canvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
    }
    function startDraw(e) { e.preventDefault(); isDrawing = true; resetIdleTimer(); ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); }
    function doDraw(e) { e.preventDefault(); if (!isDrawing) return; resetIdleTimer(); hasDrawn = true; ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); document.getElementById('warning-msg').style.opacity = '0'; }
    function endDraw() { isDrawing = false; }
    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', doDraw); window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false }); canvas.addEventListener('touchmove', doDraw, { passive: false }); window.addEventListener('touchend', endDraw);
    document.getElementById('clear-btn').addEventListener('click', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; resetIdleTimer(); });

    const drawUI = document.getElementById('draw-ui'); const openBtn = document.getElementById('open-btn'); let idleTimer;
    function closeDrawUI() { drawUI.classList.remove('open'); openBtn.style.transform = 'translateX(-50%)'; clearTimeout(idleTimer); }
    function resetIdleTimer() { clearTimeout(idleTimer); if (drawUI.classList.contains('open')) { idleTimer = setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; closeDrawUI(); }, 30000); } }
    openBtn.addEventListener('click', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; document.getElementById('warning-msg').style.opacity = '0'; drawUI.classList.add('open'); openBtn.style.transform = 'translate(-50%, 200px)'; resetIdleTimer(); });
    document.getElementById('cancel-btn').addEventListener('click', closeDrawUI);

    const scene = document.getElementById('scene');
    const MAX_ORBITS = 12;

    let ORBIT_RADIUS_X = window.innerWidth * 0.38;
    let ORBIT_RADIUS_Z = window.innerWidth * 0.2;
    let ORBIT_Y_OFFSET = 0; // 태양이 정중앙에 있으므로, 궤도 중심도 정중앙(0)으로 수정

    window.addEventListener('resize', () => {
      ORBIT_RADIUS_X = window.innerWidth * 0.38;
      ORBIT_RADIUS_Z = window.innerWidth * 0.2;
    });

    let slots = new Array(MAX_ORBITS).fill(null); let allWishes = []; let launchQueue = []; let isLaunching = false;

    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!hasDrawn) { document.getElementById('warning-msg').style.opacity = '1'; return; }
      const dataURL = canvas.toDataURL('image/webp', 0.8); closeDrawUI();
      launchQueue.push({ img: dataURL, color: currentPenColor }); processQueue();
    });

    function processQueue() {
      if (launchQueue.length === 0 || isLaunching) return;
      isLaunching = true; const nextWishData = launchQueue.shift(); launchNewWish(nextWishData.img, nextWishData.color);
      setTimeout(() => { isLaunching = false; processQueue(); }, 3500);
    }

    function getOrbit3DPosition(slotIndex, currentAngle) {
      const tiltLimit = 15 * (Math.PI / 180);
      const tiltX = -tiltLimit + (tiltLimit * 2 * (slotIndex / (MAX_ORBITS - 1)));
      const panY = slotIndex * 137.5 * (Math.PI / 180);

      const x0 = ORBIT_RADIUS_X * Math.cos(currentAngle);
      const z0 = ORBIT_RADIUS_Z * Math.sin(currentAngle);

      const y1 = z0 * Math.sin(tiltX);
      const z1 = z0 * Math.cos(tiltX);

      const x2 = x0 * Math.cos(panY) + z1 * Math.sin(panY);
      const z2 = -x0 * Math.sin(panY) + z1 * Math.cos(panY);

      return { x: x2, y: y1 + ORBIT_Y_OFFSET, z: z2 };
    }
    function lerp(start, end, t) { return start * (1 - t) + end * t; }

    function launchNewWish(imgSrc, color) {
      const card = document.createElement('div'); card.className = 'wish-card';
      card.style.border = `3px solid ${color}`; card.style.boxShadow = `0 0 30px ${color}80, inset 0 0 15px ${color}40`;

      card.innerHTML = `
    <div class="speech-tail" style="border-top: 18px solid ${color}; filter: brightness(1.2);"></div>
    <div class="speech-tail-inner" style="border-top: 14px solid rgba(10, 15, 30, 0.6);"></div>
    <img src="${imgSrc}">
    <div class="drone-base">
      <div class="drone-thruster" style="background: radial-gradient(circle, #fff 10%, ${color} 60%, transparent 100%); mix-blend-mode: screen; box-shadow: 0 0 15px ${color}"></div>
      <div class="drone-thruster" style="background: radial-gradient(circle, #fff 10%, ${color} 60%, transparent 100%); mix-blend-mode: screen; box-shadow: 0 0 15px ${color}"></div>
    </div>
  `;
      scene.appendChild(card);
      const newWish = { el: card, createdAt: Date.now(), state: 'launch', slotIndex: -1, orbitAngle: Math.random() * Math.PI * 2, speed: 0.002 + Math.random() * 0.001, curX: 0, curY: 800, curZ: 0, departVx: 0, departVy: 0, departVz: 0 };

      card.addEventListener('click', () => { if (isAdminMode) { card.remove(); slots[newWish.slotIndex] = null; allWishes = allWishes.filter(w => w !== newWish); } });

      let emptySlot = slots.findIndex(s => s === null);
      if (emptySlot !== -1) { newWish.slotIndex = emptySlot; slots[emptySlot] = newWish; }
      else {
        let oldestIndex = 0; let oldestAge = 0;
        slots.forEach((wish, idx) => { if (wish && Date.now() - wish.createdAt > oldestAge) { oldestAge = Date.now() - wish.createdAt; oldestIndex = idx; } });
        if (slots[oldestIndex]) { let departingWish = slots[oldestIndex]; departingWish.state = 'depart'; departingWish.departVx = (Math.random() - 0.5) * 10; departingWish.departVy = -5 - Math.random() * 5; departingWish.departVz = -10; }
        newWish.slotIndex = oldestIndex; slots[oldestIndex] = newWish;
      }
      allWishes.push(newWish);
    }

    function animateUniverse() {
      const now = Date.now();
      for (let i = allWishes.length - 1; i >= 0; i--) {
        let wish = allWishes[i]; let age = now - wish.createdAt;

        if (age < 1500 && wish.state !== 'depart') {
          let t = age / 1500; let ease = 1 - Math.pow(1 - t, 3);
          wish.curX = lerp(0, 0, ease); wish.curY = lerp(800, ORBIT_Y_OFFSET, ease); wish.curZ = lerp(0, 200, ease);
          wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(1.2)`;
        } else if (age >= 1500 && age < 3500 && wish.state !== 'depart') {
          wish.curX = Math.sin(age * 0.002) * 10; wish.curY = Math.cos(age * 0.0015) * 10 + ORBIT_Y_OFFSET; wish.curZ = 200;
          wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(1.2)`;
        } else if (age >= 3500 && age < 6500 && wish.state !== 'depart') {
          let t = (age - 3500) / 3000; let ease = t * t * (3 - 2 * t);
          wish.orbitAngle += wish.speed; let target = getOrbit3DPosition(wish.slotIndex, wish.orbitAngle);
          wish.curX = lerp(wish.curX, target.x, ease); wish.curY = lerp(wish.curY, target.y, ease); wish.curZ = lerp(wish.curZ, target.z, ease);
          wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(${lerp(1.2, 1, ease)})`;
        } else if (age >= 6500 && wish.state !== 'depart') {
          wish.orbitAngle += wish.speed; let pos = getOrbit3DPosition(wish.slotIndex, wish.orbitAngle);
          wish.curX = pos.x; wish.curY = pos.y; wish.curZ = pos.z;
          wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(1)`;
        } else if (wish.state === 'depart') {
          wish.curX += wish.departVx; wish.curY += wish.departVy; wish.curZ += wish.departVz;
          let opacity = parseFloat(wish.el.style.opacity || 1) - 0.008;
          wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(0.8)`;
          wish.el.style.opacity = opacity;
          if (opacity <= 0 || wish.curZ < -2000) { wish.el.remove(); allWishes.splice(i, 1); }
        }
      }
      requestAnimationFrame(animateUniverse);
    }
    animateUniverse();

    let adminClicks = 0; let adminTimer; let isAdminMode = false;
    document.getElementById('admin-secret-zone').addEventListener('click', () => {
      adminClicks++; clearTimeout(adminTimer); adminTimer = setTimeout(() => { adminClicks = 0; }, 2000);
      if (adminClicks >= 5) {
        isAdminMode = !isAdminMode; adminClicks = 0;
        if (isAdminMode) { document.body.classList.add('admin-mode'); alert("⚠️ [관리자 모드 켜짐]\n좌측 상단에서 원본 HTML을 다운로드하거나, 삭제할 소원을 터치하세요."); }
        else { document.body.classList.remove('admin-mode'); alert("✅ [관리자 모드 꺼짐]"); }
      }
    });
  </script>
