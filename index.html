<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포천 아트밸리 소원 우주선 (V7 최적화 및 스타일 변경 버전)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    width: 100vw; height: 100vh;
    background: radial-gradient(circle at 50% 50%, #050d21 0%, #010205 100%);
    overflow: hidden; font-family: 'Nanum Pen Script', cursive;
    user-select: none; touch-action: none; -webkit-touch-callout: none; 
    perspective: 1200px; transition: box-shadow 0.3s;
  }

  body.admin-mode { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.8); }
  #stars-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

  /* 요청 수정 1: 지표면을 훨씬 아래로 내려 우주 공간 확보 */
  #earth-ground {
    position: absolute; bottom: -110vh; left: -20vw; /* -80vh에서 -110vh로 대폭 하향 */
    width: 140vw; height: 110vh; border-radius: 50%;
    background: radial-gradient(circle at 50% 15%, #3a88c7 0%, #1e5b96 30%, #0d3054 60%, #010912 100%);
    box-shadow: inset 0 30px 60px rgba(255, 255, 255, 0.3), inset 0 80px 120px rgba(100, 200, 255, 0.2), 0 -20px 80px rgba(50, 150, 255, 0.4);
    z-index: 10;
  }
  #earth-ground::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.1) 0%, transparent 40%), radial-gradient(ellipse at 70% 25%, rgba(255,255,255,0.08) 0%, transparent 35%);
  }

  #main-title {
    position: absolute; top: 50px; left: 60px; z-index: 20;
    color: #fff; font-family: 'Black Han Sans', sans-serif;
    font-size: 55px; letter-spacing: 4px; text-shadow: 0 0 25px rgba(255, 200, 100, 0.6); 
  }

  #fullscreen-btn {
    position: absolute; top: 30px; right: 30px; z-index: 1000;
    padding: 12px 24px; background: rgba(50, 50, 50, 0.8);
    border: 2px solid rgba(255, 255, 255, 0.3); color: #fff; border-radius: 8px; font-size: 20px; font-family: 'Black Han Sans', sans-serif;
    cursor: pointer; transition: 0.2s;
  }
  #fullscreen-btn:hover { background: rgba(80, 80, 80, 0.9); }

  #download-btn {
    display: none; 
    position: absolute; top: 30px; left: 30px; z-index: 1000;
    padding: 12px 24px; background: rgba(0, 150, 75, 0.8);
    border: 2px solid rgba(0, 200, 100, 0.5); color: #fff; border-radius: 8px; font-size: 20px; font-family: 'Black Han Sans', sans-serif;
    cursor: pointer; transition: 0.2s;
  }
  #download-btn:hover { background: rgba(0, 180, 90, 0.9); }
  body.admin-mode #download-btn { display: block; } 

  #admin-secret-zone { position: absolute; top: 0; right: 0; width: 150px; height: 150px; z-index: 1000; }

  #scene { position: absolute; inset: 0; z-index: 5; transform-style: preserve-3d; transform: rotateX(-10deg); }
  
  /* 요청 수정 2: 가운데 구를 태양처럼 더 사실적이고 화려하게 변경 */
  #core-sun {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    width: 220px; height: 220px; border-radius: 50%;
    /* 더 복합적이고 사실적인 태양 그라데이션 */
    background: radial-gradient(circle, #ffffff 0%, #fffa8c 10%, #ffcb14 40%, #fb8c00 75%, transparent 100%);
    /* 더 복합적이고 강력한 태양광 후광 효과 */
    box-shadow: 
        0 0 100px #ffcc00, 
        0 0 200px rgba(251, 140, 0, 0.8), 
        inset 0 0 30px #ffffff,
        0 0 400px rgba(255, 150, 0, 0.4), /* 원거리 후광 */
        0 0 600px rgba(255, 100, 0, 0.2); /* 매우 먼 원거리 halo */
    animation: sunPulse 4s infinite alternate; /* 더 웅장하고 느린 펄스 */
  }
  #core-sun::after { /* 태양 표면 상세 추가 */
    content: ''; position: absolute; inset: 50px; border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, rgba(255, 255, 255, 0) 80%);
    opacity: 0.8;
  }
  @keyframes sunPulse { 
      0% { transform: translate(-50%, -50%) scale(0.98); opacity: 0.95; box-shadow: 0 0 100px #ffcc00, 0 0 200px rgba(251, 140, 0, 0.6), inset 0 0 30px #ffffff; } 
      100% { transform: translate(-50%, -50%) scale(1.02); opacity: 1; box-shadow: 0 0 150px #ffcc00, 0 0 350px rgba(251, 140, 0, 0.9), inset 0 0 30px #ffffff; } 
  }

  .wish-card {
    position: absolute; top: 40%; left: 50%; 
    width: 320px; height: 180px; margin-left: -160px; margin-top: -90px;
    background: rgba(10, 25, 60, 0.85); border-radius: 16px;
    display: flex; align-items: center; justify-content: center; padding: 10px;
    transform-style: preserve-3d; pointer-events: none; transition: border-color 0.2s;
  }
  .wish-card img { max-width: 100%; max-height: 100%; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5)); }
  
  .drone-base {
    position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 25px; background: linear-gradient(to bottom, #cfd9df, #e2ebf0);
    border: 2px solid #888; border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 5px 10px rgba(255,255,255,0.5);
    display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
  }
  .drone-thruster {
    width: 20px; height: 35px; border-radius: 50%; transform: translateY(15px);
    animation: thrusterPulse 0.3s infinite alternate;
  }
  @keyframes thrusterPulse { 0% { transform: translateY(15px) scale(0.9); opacity: 0.8; } 100% { transform: translateY(20px) scale(1.1); opacity: 1; } }

  body.admin-mode .wish-card { pointer-events: auto; cursor: pointer; border: 3px solid #ff4444 !important; }
  body.admin-mode .wish-card:hover { background: rgba(255, 0, 0, 0.4); }

  #open-btn {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    padding: 25px 80px; font-size: 45px; background: rgba(40, 40, 40, 0.8);
    color: #fff; border: 3px solid #ffffff; border-radius: 60px;
    cursor: pointer; z-index: 100; font-family: 'Black Han Sans', sans-serif;
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.3); transition: all 0.2s;
  }
  #open-btn:active { transform: translateX(-50%) scale(0.95); }

  #draw-ui {
    position: absolute; bottom: -900px; left: 50%; transform: translateX(-50%);
    width: 950px; background: rgba(5, 15, 35, 0.98); border: 3px solid #ffffff;
    border-radius: 30px 30px 0 0; box-shadow: 0 -20px 80px rgba(0, 0, 0, 0.8);
    z-index: 200; display: flex; flex-direction: column; align-items: center;
    padding: 30px 30px 40px; transition: bottom 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  #draw-ui.open { bottom: 0; }

  #toolbar { width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; }
  .tool-group { display: flex; align-items: center; gap: 15px; }
  .tool-title { color: #fff; font-family: 'Black Han Sans', sans-serif; font-size: 28px; margin-right: 10px; }
  
  .color-btn { width: 50px; height: 50px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
  .color-btn.active { transform: scale(1.2); border-color: #fff; box-shadow: 0 0 25px currentColor; }
  
  .size-btn { padding: 10px 20px; font-size: 26px; border: 2px solid #555; background: #222; color: #aaa; border-radius: 12px; font-family: 'Black Han Sans', sans-serif; cursor: pointer; transition: 0.2s; }
  .size-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px #fff; }

  #draw-canvas { background: rgba(0,0,0,0.5); border-radius: 16px; width: 800px; height: 450px; touch-action: none; cursor: crosshair; margin-bottom: 20px; border: 3px solid #ffffff; box-shadow: 0 0 30px rgba(255,255,255,0.3); transition: border-color 0.3s, box-shadow 0.3s; }
  #warning-msg { color: #ff4444; font-size: 28px; margin-bottom: 10px; opacity: 0; transition: opacity 0.3s; position: absolute; top: -40px; }
  
  .btn-group { display: flex; gap: 30px; position: relative; }
  .btn-group button { padding: 20px 50px; font-size: 35px; border: none; border-radius: 16px; font-family: 'Black Han Sans', sans-serif; cursor: pointer; transition: 0.1s; }
  .btn-group button:active { transform: scale(0.95); }
  #clear-btn { background: #444; color: #fff; }
  #cancel-btn { background: #666; color: #fff; }
  #submit-btn { background: #ffffff; color: #000; box-shadow: 0 0 30px rgba(255,255,255,0.5); transition: background 0.3s, box-shadow 0.3s; }
</style>
</head>
<body oncontextmenu="return false;">

<canvas id="stars-canvas"></canvas>
<div id="earth-ground"></div>
<div id="scene"><div id="core-sun"></div></div>

<button id="download-btn">💾 원본 HTML 다운로드</button>

<div id="main-title">포천 아트밸리 소원 우주선</div>
<button id="fullscreen-btn">🖥️ 전체화면 시작</button>

<button id="open-btn">소원 적어 보내기! 🚀</button>

<div id="admin-secret-zone"></div>

<div id="draw-ui">
  <div id="toolbar">
    <div class="tool-group">
      <span class="tool-title">빛깔</span>
      <button class="color-btn active" style="background:#ffffff; color:#ffffff;" data-color="#ffffff"></button>
      <button class="color-btn" style="background:#ff00ea; color:#ff00ea;" data-color="#ff00ea"></button>
      <button class="color-btn" style="background:#00d2ff; color:#00d2ff;" data-color="#00d2ff"></button>
      <button class="color-btn" style="background:#39ff14; color:#39ff14;" data-color="#39ff14"></button>
      <button class="color-btn" style="background:#ffeb3b; color:#ffeb3b;" data-color="#ffeb3b"></button>
    </div>
    <div class="tool-group">
      <span class="tool-title">굵기</span>
      <button class="size-btn" data-size="2.4">얇게</button>
      <button class="size-btn active" data-size="5.6">보통</button>
      <button class="size-btn" data-size="11.2">굵게</button>
    </div>
  </div>

  <canvas id="draw-canvas" width="800" height="450"></canvas>
  
  <div class="btn-group">
    <div id="warning-msg">소원을 먼저 그려야 우주로 보낼 수 있습니다!</div>
    <button id="clear-btn">지우기</button>
    <button id="cancel-btn">접기</button>
    <button id="submit-btn">우주로 발사 ✨</button>
  </div>
</div>

<script>
// --- 💾 순정 HTML 다운로드 로직 ---
document.getElementById('download-btn').addEventListener('click', () => {
  const clone = document.documentElement.cloneNode(true);
  const sceneClone = clone.querySelector('#scene');
  const cards = sceneClone.querySelectorAll('.wish-card');
  cards.forEach(c => c.remove());
  clone.querySelector('body').classList.remove('admin-mode');
  clone.querySelector('#fullscreen-btn').style.display = '';
  clone.querySelector('#draw-ui').classList.remove('open');
  clone.querySelector('#open-btn').style.transform = '';
  const htmlContent = "<!DOCTYPE html>\n<html lang=\"ko\">\n" + clone.innerHTML + "\n</html>";
  const blob = new Blob([htmlContent], {type: "text/html;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'artvalley_wish_spacecraft.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// --- 전체화면 ---
const fsBtn = document.getElementById('fullscreen-btn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().then(() => { fsBtn.style.display = 'none'; }).catch(e => alert(e));
  }
});

// --- 배경 (별 개수 150개로 축소) ---
const scanvas = document.getElementById('stars-canvas');
const sctx = scanvas.getContext('2d');
let w, h, stars = [];
window.addEventListener('resize', () => {
  w = scanvas.width = window.innerWidth; h = scanvas.height = window.innerHeight;
  stars = Array.from({length: 150}, () => ({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 2, speed: Math.random() * 0.1 + 0.05, twinkle: Math.random() * Math.PI * 2 }));
});
window.dispatchEvent(new Event('resize'));
function drawStars() {
  sctx.clearRect(0, 0, w, h);
  stars.forEach(s => {
    s.y -= s.speed; if(s.y < 0) { s.y = h; s.x = Math.random() * w; }
    s.twinkle += 0.02; sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sctx.fillStyle = `rgba(255, 255, 255, ${0.2 + 0.8 * Math.abs(Math.sin(s.twinkle))})`; sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// --- 드로잉 ---
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
let isDrawing = false; let hasDrawn = false; 
let currentPenColor = '#ffffff'; let currentPenSize = 5.6; 

// 최적화: 그림자 제거로 필기감 향상
function updateContext() {
  ctx.strokeStyle = currentPenColor; ctx.lineWidth = currentPenSize; 
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
updateContext(); 

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
    currentPenColor = btn.dataset.color; updateContext();
    canvas.style.borderColor = currentPenColor; canvas.style.boxShadow = `0 0 30px ${currentPenColor}80`;
    document.getElementById('submit-btn').style.background = currentPenColor; document.getElementById('submit-btn').style.boxShadow = `0 0 30px ${currentPenColor}80`;
    document.getElementById('draw-ui').style.borderColor = currentPenColor;
  });
});
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
    currentPenSize = parseFloat(btn.dataset.size); updateContext();
  });
});

function getPos(e) {
  const rect = canvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
}
function startDraw(e) { e.preventDefault(); isDrawing = true; resetIdleTimer(); ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); }
function doDraw(e) { e.preventDefault(); if(!isDrawing) return; resetIdleTimer(); hasDrawn = true; ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); document.getElementById('warning-msg').style.opacity = '0'; }
function endDraw() { isDrawing = false; }
canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', doDraw); window.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false}); canvas.addEventListener('touchmove', doDraw, {passive:false}); window.addEventListener('touchend', endDraw);
document.getElementById('clear-btn').addEventListener('click', () => { ctx.clearRect(0,0, canvas.width, canvas.height); hasDrawn = false; resetIdleTimer(); });

// --- UI 제어 ---
const drawUI = document.getElementById('draw-ui'); const openBtn = document.getElementById('open-btn'); let idleTimer;
function closeDrawUI() { drawUI.classList.remove('open'); openBtn.style.transform = 'translateX(-50%)'; clearTimeout(idleTimer); }
function resetIdleTimer() { clearTimeout(idleTimer); if(drawUI.classList.contains('open')) { idleTimer = setTimeout(() => { ctx.clearRect(0,0, canvas.width, canvas.height); hasDrawn = false; closeDrawUI(); }, 30000); } }
openBtn.addEventListener('click', () => { ctx.clearRect(0,0, canvas.width, canvas.height); hasDrawn = false; document.getElementById('warning-msg').style.opacity = '0'; drawUI.classList.add('open'); openBtn.style.transform = 'translate(-50%, 200px)'; resetIdleTimer(); });
document.getElementById('cancel-btn').addEventListener('click', closeDrawUI);

// --- 우주선 로직 (최대 우주선 개수 12개) ---
const scene = document.getElementById('scene');
const MAX_ORBITS = 12; const ORBIT_RADIUS = 700; 
let slots = new Array(MAX_ORBITS).fill(null); let allWishes = []; let launchQueue = []; let isLaunching = false; 

document.getElementById('submit-btn').addEventListener('click', () => {
  if(!hasDrawn) { document.getElementById('warning-msg').style.opacity = '1'; return; }
  const dataURL = canvas.toDataURL('image/webp', 0.8); closeDrawUI();
  launchQueue.push({ img: dataURL, color: currentPenColor }); processQueue();
});

function processQueue() {
  if (launchQueue.length === 0 || isLaunching) return;
  isLaunching = true; const nextWishData = launchQueue.shift(); launchNewWish(nextWishData.img, nextWishData.color); 
  setTimeout(() => { isLaunching = false; processQueue(); }, 3500); 
}

function getOrbit3DPosition(slotIndex, currentAngle) {
  const tiltLimit = 25 * (Math.PI / 180); const tiltX = -tiltLimit + (tiltLimit * 2 * (slotIndex / (MAX_ORBITS - 1))); const panY = slotIndex * 137.5 * (Math.PI / 180);
  const x0 = ORBIT_RADIUS * Math.cos(currentAngle); const z0 = ORBIT_RADIUS * Math.sin(currentAngle);
  const y1 = z0 * Math.sin(tiltX); const z1 = z0 * Math.cos(tiltX);
  const x2 = x0 * Math.cos(panY) + z1 * Math.sin(panY); const z2 = -x0 * Math.sin(panY) + z1 * Math.cos(panY);
  return { x: x2, y: y1, z: z2 };
}
function lerp(start, end, t) { return start * (1 - t) + end * t; }

function launchNewWish(imgSrc, color) {
  const card = document.createElement('div'); card.className = 'wish-card'; card.style.border = `2px solid ${color}`; card.style.boxShadow = `0 0 30px ${color}80, inset 0 0 15px ${color}40`;
  card.innerHTML = `<img src="${imgSrc}"><div class="drone-base"><div class="drone-thruster" style="background: radial-gradient(ellipse, #ffffff 10%, ${color} 50%, transparent 80%);"></div><div class="drone-thruster" style="background: radial-gradient(ellipse, #ffffff 10%, ${color} 50%, transparent 80%);"></div></div>`;
  scene.appendChild(card);
  const newWish = { el: card, createdAt: Date.now(), state: 'launch', slotIndex: -1, orbitAngle: Math.random() * Math.PI * 2, speed: 0.002 + Math.random() * 0.001, curX: 0, curY: 500, curZ: 0, departVx: 0, departVy: 0, departVz: 0 };
  card.addEventListener('click', () => { if(isAdminMode) { card.remove(); slots[newWish.slotIndex] = null; allWishes = allWishes.filter(w => w !== newWish); } });
  let emptySlot = slots.findIndex(s => s === null);
  if (emptySlot !== -1) { newWish.slotIndex = emptySlot; slots[emptySlot] = newWish; } 
  else {
    let oldestIndex = 0; let oldestAge = 0;
    slots.forEach((wish, idx) => { if(wish && Date.now() - wish.createdAt > oldestAge) { oldestAge = Date.now() - wish.createdAt; oldestIndex = idx; } });
    if(slots[oldestIndex]) { let departingWish = slots[oldestIndex]; departingWish.state = 'depart'; departingWish.departVx = (Math.random() - 0.5) * 10; departingWish.departVy = -5 - Math.random() * 5; departingWish.departVz = -10; }
    newWish.slotIndex = oldestIndex; slots[oldestIndex] = newWish;
  }
  allWishes.push(newWish);
}

function animateUniverse() {
  const now = Date.now();
  for (let i = allWishes.length - 1; i >= 0; i--) {
    let wish = allWishes[i]; let age = now - wish.createdAt;
    if (age < 1500 && wish.state !== 'depart') {
      let t = age / 1500; let ease = 1 - Math.pow(1 - t, 3);
      wish.curX = lerp(0, 0, ease); wish.curY = lerp(800, 0, ease); wish.curZ = lerp(0, 500, ease); 
      wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(1.2)`;
    } else if (age >= 1500 && age < 3500 && wish.state !== 'depart') {
      wish.curX = Math.sin(age * 0.002) * 10; wish.curY = Math.cos(age * 0.0015) * 10; wish.curZ = 500;
      wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(1.2)`;
    } else if (age >= 3500 && age < 6500 && wish.state !== 'depart') {
      let t = (age - 3500) / 3000; let ease = t * t * (3 - 2 * t); 
      wish.orbitAngle += wish.speed; let target = getOrbit3DPosition(wish.slotIndex, wish.orbitAngle);
      wish.curX = lerp(wish.curX, target.x, ease); wish.curY = lerp(wish.curY, target.y, ease); wish.curZ = lerp(wish.curZ, target.z, ease);
      wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(${lerp(1.2, 1, ease)})`;
    } else if (age >= 6500 && wish.state !== 'depart') {
      wish.orbitAngle += wish.speed; let pos = getOrbit3DPosition(wish.slotIndex, wish.orbitAngle);
      wish.curX = pos.x; wish.curY = pos.y; wish.curZ = pos.z;
      wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(1)`;
    } else if (wish.state === 'depart') {
      wish.curX += wish.departVx; wish.curY += wish.departVy; wish.curZ += wish.departVz; 
      let opacity = parseFloat(wish.el.style.opacity || 1) - 0.008; 
      wish.el.style.transform = `translate3d(${wish.curX}px, ${wish.curY}px, ${wish.curZ}px) scale(0.8)`;
      wish.el.style.opacity = opacity;
      if (opacity <= 0 || wish.curZ < -2000) { wish.el.remove(); allWishes.splice(i, 1); }
    }
  }
  requestAnimationFrame(animateUniverse);
}
animateUniverse();

// --- 관리자 모드 ---
let adminClicks = 0; let adminTimer; let isAdminMode = false;
document.getElementById('admin-secret-zone').addEventListener('click', () => {
  adminClicks++; clearTimeout(adminTimer); adminTimer = setTimeout(() => { adminClicks = 0; }, 2000);
  if(adminClicks >= 5) {
    isAdminMode = !isAdminMode; adminClicks = 0;
    if(isAdminMode) { document.body.classList.add('admin-mode'); alert("⚠️ [관리자 모드 켜짐]\n좌측 상단에서 원본 HTML을 다운로드하거나, 삭제할 소원을 터치하세요."); } 
    else { document.body.classList.remove('admin-mode'); alert("✅ [관리자 모드 꺼짐]"); }
  }
});
</script>
</body>
</html>
