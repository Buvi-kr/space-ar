<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포천 아트밸리 소원 우주선</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: url('assets/new_bg.webp') center/cover no-repeat;
      background-color: #050d21;
      overflow: hidden;
      font-family: 'Nanum Pen Script', cursive;
      user-select: none; touch-action: none;
      -webkit-touch-callout: none;
    }

    body.admin-mode { box-shadow: inset 0 0 50px rgba(255,0,0,0.8); }

    #earth-ground { display: none; }

    #scene {
      position: absolute; inset: 0; z-index: 5;
      transform-style: preserve-3d;
      transform: rotateX(-5deg);
    }

    #main-title {
      position: absolute; top: 30px; left: 40px; z-index: 200;
      color: #fff; font-family: 'Black Han Sans', sans-serif;
      font-size: 40px; letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(255,200,100,0.6);
    }

    #fullscreen-btn {
      position: absolute; top: 25px; right: 25px; z-index: 1000;
      padding: 10px 20px;
      background: rgba(50,50,50,0.8);
      border: 2px solid rgba(255,255,255,0.3);
      color: #fff; border-radius: 8px;
      font-size: 18px; font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    #download-btn {
      display: none; position: absolute; top: 25px; left: 25px; z-index: 1000;
      padding: 10px 20px; background: rgba(0,150,75,0.8);
      border: 2px solid rgba(0,200,100,0.5);
      color: #fff; border-radius: 8px;
      font-size: 18px; font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    body.admin-mode #download-btn { display: block; }

    #admin-secret-zone {
      position: absolute; top: 0; right: 0;
      width: 150px; height: 150px; z-index: 1000;
    }

    /* 소원 카드 */
    .wish-card {
      position: absolute; top: 50%; left: 50%;
      width: 280px; height: 160px;
      margin-left: -140px; margin-top: -80px;
      background: rgba(10,15,30,0.85);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      padding: 12px; transform-style: preserve-3d; pointer-events: none;
    }
    .wish-card img { max-width: 100%; max-height: 100%; z-index: 5; }
    .speech-tail {
      position: absolute; bottom: -16px; left: 50%;
      transform: translateX(-50%);
      border-left: 16px solid transparent;
      border-right: 16px solid transparent; z-index: 2;
    }
    .drone-base {
      position: absolute; bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 140px; height: 80px;
      display: flex; justify-content: space-between;
      align-items: center; padding: 0 30px; z-index: 4;
    }
    .drone-thruster {
      width: 18px; height: 30px; border-radius: 50%;
      transform: translateY(10px);
      animation: thrusterPulse 0.15s infinite alternate;
    }
    @keyframes thrusterPulse {
      0%  { transform: translateY(9px)  scale(0.9); opacity: 0.8; }
      100%{ transform: translateY(13px) scale(1.3); opacity: 1;   }
    }
    body.admin-mode .wish-card {
      pointer-events: auto; cursor: pointer; border: 3px solid #ff4444 !important;
    }
    body.admin-mode .wish-card:hover { background: rgba(255,0,0,0.4); }

    /* ─── 발사 버튼 ─── */
    #open-btn {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      padding: 20px 70px; font-size: 40px;
      background: rgba(20,30,50,0.9);
      color: #fff; border: 2px solid rgba(255,255,255,0.5);
      border-radius: 60px; cursor: pointer; z-index: 100;
      font-family: 'Black Han Sans', sans-serif;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 25px rgba(100,200,255,0.4);
      transition: all 0.3s;
    }
    #open-btn:hover {
      transform: translateX(-50%) translateY(-4px) scale(1.04);
      box-shadow: 0 16px 40px rgba(0,0,0,0.7), 0 0 40px rgba(100,200,255,0.6);
    }
    #open-btn:active { transform: translateX(-50%) translateY(2px) scale(0.95); }

    /* ─── 그리기 패널 (하단 50% 채우기) ─── */
    #draw-ui {
      position: absolute;
      bottom: -60vh;          /* 숨김 상태 */
      left: 50%; transform: translateX(-50%);
      width: min(900px, 98vw);
      height: 50vh;           /* 화면 절반 */
      background: rgba(5,10,20,0.97);
      border: 1px solid rgba(255,255,255,0.25);
      border-bottom: none; border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.8);
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 16px 20px 12px;
      transition: bottom 0.5s cubic-bezier(0.2,0.8,0.2,1);
      overflow: hidden;
    }
    #draw-ui.open { bottom: 0; }

    /* ─── 상단 툴바 ─── */
    #toolbar {
      width: 100%; max-width: 820px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; flex-shrink: 0;
      gap: 8px;
    }
    .tool-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tool-title {
      color: #fff; font-family: 'Black Han Sans', sans-serif;
      font-size: 20px;
    }
    .color-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35); cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .color-btn.active { transform: scale(1.3); border-color: #fff; }

    .size-btn {
      padding: 7px 14px; font-size: 18px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(30,30,40,0.7); color: #ccc;
      border-radius: 10px; font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    .size-btn.active { background: rgba(255,255,255,0.9); color: #000; border-color: #fff; }

    /* 지우개 버튼 */
    #eraser-btn {
      padding: 7px 14px; font-size: 18px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(30,30,40,0.7); color: #ccc;
      border-radius: 10px; font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    #eraser-btn.active { background: rgba(255,200,100,0.9); color: #000; border-color: #ffc864; }

    /* ─── 스티커 행 ─── */
    #sticker-bar {
      width: 100%; max-width: 820px;
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 8px; flex-shrink: 0; flex-wrap: wrap;
    }
    .sticker-label {
      color: #fff; font-family: 'Black Han Sans', sans-serif; font-size: 18px; margin-right: 4px;
    }
    .sticker-btn {
      font-size: 26px; width: 42px; height: 42px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.15s;
      line-height: 1;
    }
    .sticker-btn:hover  { background: rgba(255,255,255,0.18); transform: scale(1.15); }
    .sticker-btn.active { background: rgba(255,220,80,0.4); border-color: #ffd700; transform: scale(1.2); }

    /* 스티커 크기 조절 */
    #sticker-size-group { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .ssize-btn {
      padding: 5px 10px; font-size: 16px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(30,30,40,0.7); color: #ccc;
      border-radius: 8px; font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    .ssize-btn.active { background: rgba(255,255,255,0.85); color: #000; }

    /* ─── 그리기 캔버스 ─── */
    #draw-canvas {
      background: rgba(0,0,0,0.45);
      border-radius: 12px;
      /* 실제 해상도: JS로 크기 맞춤 */
      width: 100%; max-width: 820px;
      flex: 1 1 auto;           /* 남은 세로 공간 채우기 */
      min-height: 0;
      touch-action: none; cursor: crosshair;
      margin-bottom: 8px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    #draw-canvas.eraser-mode { cursor: cell; }
    #draw-canvas.sticker-mode { cursor: copy; }

    /* ─── 경고 & 버튼 행 ─── */
    #warning-msg {
      color: #ff5555; font-size: 22px; opacity: 0;
      transition: opacity 0.3s; position: absolute;
      top: -36px; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
    }
    .btn-group {
      display: flex; gap: 16px; position: relative; flex-shrink: 0;
    }
    .btn-group button {
      padding: 12px 32px; font-size: 26px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 16px;
      font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    .btn-group button:active { transform: scale(0.93) translateY(4px); }

    #clear-btn  { background: rgba(60,60,70,0.8); color: #fff; }
    #cancel-btn { background: rgba(100,100,110,0.8); color: #fff; }
    #submit-btn { background: rgba(255,255,255,0.9); color: #000; box-shadow: 0 0 24px rgba(255,255,255,0.5); }
  </style>
</head>

<body oncontextmenu="return false;">

  <div id="earth-ground"></div>
  <div id="scene"></div>

  <button id="download-btn">💾 원본 HTML 다운로드</button>
  <div id="main-title">포천 아트밸리 소원 우주선</div>
  <button id="fullscreen-btn">🖥️ 전체화면 시작</button>
  <button id="open-btn">소원 적어 보내기! 🚀</button>
  <div id="admin-secret-zone"></div>

  <!-- ─── 소원 그리기 패널 ─── -->
  <div id="draw-ui">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-title">빛깔</span>
        <button class="color-btn active" style="background:#ffffff" data-color="#ffffff"></button>
        <button class="color-btn" style="background:#ff00ea" data-color="#ff00ea"></button>
        <button class="color-btn" style="background:#00d2ff" data-color="#00d2ff"></button>
        <button class="color-btn" style="background:#39ff14" data-color="#39ff14"></button>
        <button class="color-btn" style="background:#ffeb3b" data-color="#ffeb3b"></button>
        <button class="color-btn" style="background:#ff6b35" data-color="#ff6b35"></button>
      </div>
      <div class="tool-group">
        <span class="tool-title">굵기</span>
        <button class="size-btn" data-size="1.8">얇게</button>
        <button class="size-btn active" data-size="4.0">보통</button>
        <button class="size-btn" data-size="8.0">굵게</button>
        <button id="eraser-btn">🧹 지우개</button>
      </div>
    </div>

    <!-- 스티커 행 -->
    <div id="sticker-bar">
      <span class="sticker-label">스티커</span>
      <button class="sticker-btn" data-emoji="⭐">⭐</button>
      <button class="sticker-btn" data-emoji="🌙">🌙</button>
      <button class="sticker-btn" data-emoji="🚀">🚀</button>
      <button class="sticker-btn" data-emoji="🌈">🌈</button>
      <button class="sticker-btn" data-emoji="❤️">❤️</button>
      <button class="sticker-btn" data-emoji="🎉">🎉</button>
      <button class="sticker-btn" data-emoji="🦋">🦋</button>
      <button class="sticker-btn" data-emoji="🌸">🌸</button>
      <button class="sticker-btn" data-emoji="🐱">🐱</button>
      <button class="sticker-btn" data-emoji="🐶">🐶</button>
      <button class="sticker-btn" data-emoji="🌟">🌟</button>
      <button class="sticker-btn" data-emoji="🍭">🍭</button>
      <button class="sticker-btn" data-emoji="🎈">🎈</button>
      <button class="sticker-btn" data-emoji="👑">👑</button>
      <button class="sticker-btn" data-emoji="🌊">🌊</button>
      <div id="sticker-size-group">
        <span class="tool-title" style="font-size:16px">크기</span>
        <button class="ssize-btn" data-ssize="28">소</button>
        <button class="ssize-btn active" data-ssize="46">중</button>
        <button class="ssize-btn" data-ssize="70">대</button>
      </div>
    </div>

    <canvas id="draw-canvas"></canvas>

    <div class="btn-group">
      <div id="warning-msg">소원을 먼저 그려야 우주로 보낼 수 있습니다!</div>
      <button id="clear-btn">지우기</button>
      <button id="cancel-btn">접기</button>
      <button id="submit-btn">우주로 발사 ✨</button>
    </div>
  </div>

  <script>
    /* ── 다운로드 ── */
    document.getElementById('download-btn').addEventListener('click', () => {
      const clone = document.documentElement.cloneNode(true);
      clone.querySelector('#scene').querySelectorAll('.wish-card').forEach(c => c.remove());
      clone.querySelector('body').classList.remove('admin-mode');
      clone.querySelector('#draw-ui').classList.remove('open');
      const blob = new Blob(['<!DOCTYPE html>\n<html lang="ko">\n' + clone.innerHTML + '\n</html>'], {type:'text/html;charset=utf-8'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'artvalley_wish_spacecraft.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    /* ── 전체화면 ── */
    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement)
        document.documentElement.requestFullscreen().then(() => fsBtn.style.display = 'none').catch(e => alert(e));
    });

    /* ══════════════════════════════════════
       그리기 캔버스 설정
    ══════════════════════════════════════ */
    const canvas = document.getElementById('draw-canvas');
    const ctx    = canvas.getContext('2d');
    let isDrawing = false, hasDrawn = false;
    let penColor = '#ffffff', penSize = 4.0;
    let eraserMode = false;
    let stickerMode = false, currentSticker = '', stickerSize = 46;

    /* 캔버스 실제 해상도를 표시 크기에 맞춤 (저사양 최적화: devicePixelRatio=1 고정) */
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const W = Math.round(rect.width);
      const H = Math.round(rect.height);
      if (canvas.width !== W || canvas.height !== H) {
        const tmp = document.createElement('canvas');
        tmp.width = canvas.width; tmp.height = canvas.height;
        tmp.getContext('2d').drawImage(canvas, 0, 0);
        canvas.width  = W; canvas.height = H;
        ctx.drawImage(tmp, 0, 0, W, H);
        applyCtxStyle();
      }
    }
    function applyCtxStyle() {
      ctx.strokeStyle = eraserMode ? 'rgba(0,0,0,1)' : penColor;
      ctx.lineWidth   = eraserMode ? penSize * 4 : penSize;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.globalCompositeOperation = eraserMode ? 'destination-out' : 'source-over';
      ctx.shadowBlur = 0; /* 성능 위해 글로우 제거 */
    }
    applyCtxStyle();

    /* 색 버튼 */
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        penColor = btn.dataset.color;
        eraserMode = false; stickerMode = false;
        document.getElementById('eraser-btn').classList.remove('active');
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        canvas.className = '';
        applyCtxStyle();
        document.getElementById('submit-btn').style.background = penColor;
        document.getElementById('draw-ui').style.borderColor = penColor;
      });
    });

    /* 굵기 버튼 */
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        penSize = parseFloat(btn.dataset.size);
        eraserMode = false; stickerMode = false;
        document.getElementById('eraser-btn').classList.remove('active');
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        canvas.className = '';
        applyCtxStyle();
      });
    });

    /* 지우개 */
    const eraserBtn = document.getElementById('eraser-btn');
    eraserBtn.addEventListener('click', () => {
      eraserMode = !eraserMode;
      stickerMode = false;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      eraserBtn.classList.toggle('active', eraserMode);
      canvas.className = eraserMode ? 'eraser-mode' : '';
      applyCtxStyle();
    });

    /* 스티커 버튼 */
    document.querySelectorAll('.sticker-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const same = stickerMode && currentSticker === btn.dataset.emoji;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        eraserMode = false; eraserBtn.classList.remove('active');
        if (same) {
          stickerMode = false; canvas.className = '';
        } else {
          stickerMode = true; currentSticker = btn.dataset.emoji;
          btn.classList.add('active');
          canvas.className = 'sticker-mode';
        }
        applyCtxStyle();
      });
    });

    /* 스티커 크기 */
    document.querySelectorAll('.ssize-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ssize-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        stickerSize = parseInt(btn.dataset.ssize);
      });
    });

    /* ── 입력 좌표 변환 ── */
    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (cx - r.left) * (canvas.width  / r.width),
        y: (cy - r.top)  * (canvas.height / r.height)
      };
    }

    /* ── 스티커 찍기 ── */
    function placeSticker(e) {
      const p = getPos(e);
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.font = stickerSize + 'px serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(currentSticker, p.x, p.y);
      ctx.restore();
      hasDrawn = true;
      document.getElementById('warning-msg').style.opacity = '0';
    }

    /* ── 펜 드로잉 ── */
    function startDraw(e) {
      e.preventDefault(); resetIdleTimer();
      if (stickerMode) { placeSticker(e); return; }
      isDrawing = true;
      applyCtxStyle();
      const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
    }
    function doDraw(e) {
      e.preventDefault();
      if (stickerMode || !isDrawing) return;
      resetIdleTimer(); hasDrawn = true;
      const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
      document.getElementById('warning-msg').style.opacity = '0';
    }
    function endDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown',  startDraw);
    canvas.addEventListener('mousemove',  doDraw);
    window.addEventListener('mouseup',    endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive:false });
    canvas.addEventListener('touchmove',  doDraw,    { passive:false });
    window.addEventListener('touchend',   endDraw);

    /* ── 지우기 버튼 ── */
    document.getElementById('clear-btn').addEventListener('click', () => {
      ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn = false; resetIdleTimer();
    });

    /* ── 패널 열기/닫기 ── */
    const drawUI = document.getElementById('draw-ui');
    const openBtn = document.getElementById('open-btn');
    let idleTimer;

    function closeDrawUI() {
      drawUI.classList.remove('open');
      openBtn.style.transform = 'translateX(-50%)';
      clearTimeout(idleTimer);
    }
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      if (drawUI.classList.contains('open'))
        idleTimer = setTimeout(() => { ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn = false; closeDrawUI(); }, 30000);
    }

    openBtn.addEventListener('click', () => {
      ctx.clearRect(0,0,canvas.width,canvas.height); hasDrawn = false;
      document.getElementById('warning-msg').style.opacity = '0';
      drawUI.classList.add('open');
      openBtn.style.transform = 'translate(-50%, 200px)';
      resetIdleTimer();
      /* 패널이 열린 후 캔버스 크기 맞춤 */
      requestAnimationFrame(() => { requestAnimationFrame(resizeCanvas); });
    });
    document.getElementById('cancel-btn').addEventListener('click', closeDrawUI);

    /* 창 크기 변경 시 캔버스 재조정 */
    window.addEventListener('resize', () => { if (drawUI.classList.contains('open')) resizeCanvas(); });

    /* ══════════════════════════════════════
       우주 궤도 애니메이션
    ══════════════════════════════════════ */
    const scene = document.getElementById('scene');
    const MAX_ORBITS = 12;
    let ORBIT_RADIUS_X = window.innerWidth * 0.38;
    let ORBIT_RADIUS_Z = window.innerWidth * 0.2;
    const ORBIT_Y_OFFSET = 0;

    window.addEventListener('resize', () => {
      ORBIT_RADIUS_X = window.innerWidth * 0.38;
      ORBIT_RADIUS_Z = window.innerWidth * 0.2;
    });

    let slots = new Array(MAX_ORBITS).fill(null);
    let allWishes = [], launchQueue = [], isLaunching = false;

    /* ── 발사 ── */
    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!hasDrawn) { document.getElementById('warning-msg').style.opacity = '1'; return; }
      const dataURL = canvas.toDataURL('image/webp', 0.7);
      closeDrawUI();
      launchQueue.push({ img: dataURL, color: penColor });
      processQueue();
    });

    function processQueue() {
      if (!launchQueue.length || isLaunching) return;
      isLaunching = true;
      const d = launchQueue.shift(); launchNewWish(d.img, d.color);
      setTimeout(() => { isLaunching = false; processQueue(); }, 3500);
    }

    function getOrbit3DPosition(slotIndex, angle) {
      const tiltLimit = 15 * (Math.PI/180);
      const tiltX = -tiltLimit + tiltLimit * 2 * (slotIndex / (MAX_ORBITS-1));
      const panY  = slotIndex * 137.5 * (Math.PI/180);
      const x0 = ORBIT_RADIUS_X * Math.cos(angle);
      const z0 = ORBIT_RADIUS_Z * Math.sin(angle);
      const y1 = z0 * Math.sin(tiltX);
      const z1 = z0 * Math.cos(tiltX);
      const x2 = x0 * Math.cos(panY) + z1 * Math.sin(panY);
      const z2 = -x0 * Math.sin(panY) + z1 * Math.cos(panY);
      return { x: x2, y: y1 + ORBIT_Y_OFFSET, z: z2 };
    }

    function lerp(a, b, t) { return a*(1-t) + b*t; }

    function launchNewWish(imgSrc, color) {
      const card = document.createElement('div');
      card.className = 'wish-card';
      card.style.border = `3px solid ${color}`;
      card.style.boxShadow = `0 0 25px ${color}60`;
      const shipId = Math.floor(Math.random()*3)+1;
      card.innerHTML = `
        <div class="speech-tail" style="border-top:16px solid ${color};"></div>
        <img src="${imgSrc}">
        <div class="drone-base" style="background:url('assets/ship${shipId}_bg.png') center/contain no-repeat;">
          <div class="drone-thruster" style="background:radial-gradient(circle,#fff 10%,${color} 60%,transparent 100%);"></div>
          <div class="drone-thruster" style="background:radial-gradient(circle,#fff 10%,${color} 60%,transparent 100%);"></div>
        </div>`;
      scene.appendChild(card);

      const wish = {
        el: card, createdAt: Date.now(), state: 'launch',
        slotIndex: -1, orbitAngle: Math.random()*Math.PI*2,
        speed: 0.002 + Math.random()*0.001,
        curX: 0, curY: 800, curZ: 0,
        departVx: 0, departVy: 0, departVz: 0
      };

      card.addEventListener('click', () => {
        if (isAdminMode) { card.remove(); slots[wish.slotIndex] = null; allWishes = allWishes.filter(w => w !== wish); }
      });

      let emptySlot = slots.findIndex(s => s === null);
      if (emptySlot !== -1) { wish.slotIndex = emptySlot; slots[emptySlot] = wish; }
      else {
        let oi = 0, oa = 0;
        slots.forEach((w,i) => { if (w && Date.now()-w.createdAt > oa) { oa = Date.now()-w.createdAt; oi = i; } });
        if (slots[oi]) {
          const dw = slots[oi]; dw.state = 'depart';
          const sx = window.innerWidth*0.45, sy = -window.innerHeight*0.45, sz = 150;
          const dx = sx-dw.curX, dy = sy-dw.curY, dz = sz-dw.curZ;
          const dist = Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
          dw.departVx = dx/dist*12; dw.departVy = dy/dist*12; dw.departVz = dz/dist*12;
          dw.speedAcc = 1.05;
        }
        wish.slotIndex = oi; slots[oi] = wish;
      }
      allWishes.push(wish);
    }

    function animateUniverse() {
      const now = Date.now();
      for (let i = allWishes.length-1; i >= 0; i--) {
        const w = allWishes[i]; const age = now - w.createdAt;
        if (age < 1500 && w.state !== 'depart') {
          const e = 1 - Math.pow(1-(age/1500), 3);
          w.curX = 0; w.curY = lerp(800, ORBIT_Y_OFFSET, e); w.curZ = lerp(0, 200, e);
          w.el.style.transform = `translate3d(${w.curX}px,${w.curY}px,${w.curZ}px) scale(1.2)`;
        } else if (age < 3500 && w.state !== 'depart') {
          w.curX = Math.sin(age*0.002)*10; w.curY = Math.cos(age*0.0015)*10+ORBIT_Y_OFFSET; w.curZ = 200;
          w.el.style.transform = `translate3d(${w.curX}px,${w.curY}px,${w.curZ}px) scale(1.2)`;
        } else if (age < 6500 && w.state !== 'depart') {
          const t = (age-3500)/3000; const e = t*t*(3-2*t);
          w.orbitAngle += w.speed;
          const tgt = getOrbit3DPosition(w.slotIndex, w.orbitAngle);
          w.curX = lerp(w.curX, tgt.x, e); w.curY = lerp(w.curY, tgt.y, e); w.curZ = lerp(w.curZ, tgt.z, e);
          w.el.style.transform = `translate3d(${w.curX}px,${w.curY}px,${w.curZ}px) scale(${lerp(1.2,1,e)})`;
        } else if (w.state !== 'depart') {
          w.orbitAngle += w.speed;
          const p = getOrbit3DPosition(w.slotIndex, w.orbitAngle);
          w.curX = p.x; w.curY = p.y; w.curZ = p.z;
          w.el.style.transform = `translate3d(${w.curX}px,${w.curY}px,${w.curZ}px) scale(1)`;
        } else {
          if (w.speedAcc) { w.departVx *= w.speedAcc; w.departVy *= w.speedAcc; w.departVz *= w.speedAcc; }
          w.curX += w.departVx; w.curY += w.departVy; w.curZ += w.departVz;
          const op = parseFloat(w.el.style.opacity||1) - 0.012;
          w.el.style.transform = `translate3d(${w.curX}px,${w.curY}px,${w.curZ}px) scale(0.5) rotate(15deg)`;
          w.el.style.opacity = op;
          if (op <= 0 || w.curX > window.innerWidth || w.curY < -window.innerHeight) {
            w.el.remove(); allWishes.splice(i,1);
          }
        }
      }
      requestAnimationFrame(animateUniverse);
    }
    animateUniverse();

    /* ── 관리자 모드 ── */
    let adminClicks = 0, adminTimer, isAdminMode = false;
    document.getElementById('admin-secret-zone').addEventListener('click', () => {
      adminClicks++; clearTimeout(adminTimer);
      adminTimer = setTimeout(() => adminClicks = 0, 2000);
      if (adminClicks >= 5) {
        isAdminMode = !isAdminMode; adminClicks = 0;
        document.body.classList.toggle('admin-mode', isAdminMode);
        alert(isAdminMode ? '⚠️ [관리자 모드 켜짐]\n좌측 상단에서 다운로드하거나 소원을 터치해 삭제하세요.' : '✅ [관리자 모드 꺼짐]');
      }
    });
  </script>
</body>
