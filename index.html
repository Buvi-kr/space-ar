<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>포천 아트밸리 소원 우주선</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: url('assets/new_bg.webp') center/cover no-repeat;
      background-color: #050d21;
      background-size: 110% 110%; /* 여백을 두고 동적 이동을 위해 조금 크게 설정 */
      overflow: hidden;
      font-family: 'Nanum Pen Script', cursive;
      user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
      animation: bgPan 60s linear infinite alternate;
    }

    /* 13. 배경 동적 애니메이션 */
    @keyframes bgPan {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    body.admin-mode { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.8); }

    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    #main-title {
      position: absolute;
      top: 30px;
      left: 40px;
      z-index: 200;
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 40px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(255, 200, 100, 0.6);
    }

    #fullscreen-btn, #download-btn {
      position: absolute;
      z-index: 1000;
      padding: 10px 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      border-radius: 8px;
      font-size: 18px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }
    #fullscreen-btn { top: 25px; right: 25px; background: rgba(50, 50, 50, 0.8); }
    #download-btn { top: 25px; left: 25px; background: rgba(0, 150, 75, 0.8); display: none; }
    body.admin-mode #download-btn { display: block; }
    
    #admin-secret-zone {
      position: absolute;
      top: 0;
      right: 0;
      width: 150px;
      height: 150px;
      z-index: 1000;
    }

    /* 4. 소원 카드 체류 및 레이어 로직 */
    .wish-card {
      position: absolute;
      /* No fixed width/height for dynamic sizing */
      background: rgba(10, 15, 30, 0.85);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      pointer-events: none;
      transition: left 2.5s cubic-bezier(0.25, 1, 0.5, 1), top 2.5s cubic-bezier(0.25, 1, 0.5, 1), transform 2.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s;
      transform-origin: center;
    }
    
    body.admin-mode .wish-card {
      pointer-events: auto;
      cursor: pointer;
      border: 3px solid #ff4444 !important;
    }

    /* 도착 후 플로팅 효과 부여 CSS 클래스 */
    .wish-card.floating {
      animation: floatAnim 3s infinite ease-in-out;
      z-index: 100; 
    }
    .wish-card.departing {
      transform: translateY(-200vh) rotate(25deg);
      opacity: 0;
      transition: transform 2s ease-in, opacity 2s ease-in;
    }

    @keyframes floatAnim {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .wish-card img { max-width: 100%; max-height: 100%; z-index: 5; }

    .speech-tail {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      z-index: 2;
    }

    .drone-base {
      position: absolute;
      bottom: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%; /* proportional */
      height: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10%;
      z-index: 4;
    }

    .drone-thruster {
      width: 18px;
      height: 30px;
      border-radius: 50%;
      transform: translateY(10px);
      animation: thrusterPulse 0.15s infinite alternate;
    }

    @keyframes thrusterPulse {
      0% { transform: translateY(9px) scale(0.9); opacity: 0.8; }
      100% { transform: translateY(13px) scale(1.3); opacity: 1; }
    }

    /* 7. 파티클 이펙트 */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: particleFade 1.2s forwards ease-out;
    }
    @keyframes particleFade {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(3) translateY(30px); opacity: 0; }
    }

    /* 발사 버튼 */
    #open-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 70px;
      font-size: 40px;
      background: rgba(20, 30, 50, 0.9);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 60px;
      cursor: pointer;
      z-index: 100;
      font-family: 'Black Han Sans', sans-serif;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 25px rgba(100, 200, 255, 0.4);
      transition: all 0.3s;
    }
    #open-btn:hover { transform: translateX(-50%) translateY(-4px) scale(1.04); box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7), 0 0 40px rgba(100, 200, 255, 0.6); }

    /* 3. 그리기 패널 (세로형 전시 키오스크 비율) */
    #draw-ui {
      position: absolute;
      bottom: -600px;
      left: 50%;
      transform: translateX(-50%);
      width: 1000px;
      height: 520px;
      background: rgba(5, 10, 20, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.8);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: bottom 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      overflow: hidden;
    }
    #draw-ui.open { bottom: 0; }

    #toolbar {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 12px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .tool-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tool-title { color: #fff; font-family: 'Black Han Sans', sans-serif; font-size: 18px; }

    .color-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.35); cursor: pointer; transition: transform 0.2s, border-color 0.2s;
    }
    .color-btn.active { transform: scale(1.3); border-color: #fff; }

    .size-btn {
      padding: 8px 16px; font-size: 18px; border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7); color: #ccc; border-radius: 8px;
      font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    .size-btn.active { background: rgba(255, 255, 255, 0.9); color: #000; border-color: #fff; }

    #main-draw-area {
      display: flex; flex-direction: row; width: 100%; flex: 1 1 auto; gap: 16px; margin-bottom: 16px; min-height: 0;
    }
    #draw-canvas {
      background: rgba(0, 0, 0, 0.5); border-radius: 12px; flex: 1 1 0; min-width: 0; min-height: 200px;
      touch-action: none; cursor: crosshair; border: 2px solid rgba(255, 255, 255, 0.2);
    }

    #right-sidebar {
      width: 260px; flex-shrink: 0; background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 14px;
      display: flex; flex-direction: column; overflow-y: auto;
    }

    #sticker-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px;
    }
    .sticker-btn {
      font-size: 26px; width: 100%; height: 46px; background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1;
    }
    .sticker-btn.active { background: rgba(255, 220, 80, 0.4); border-color: #ffd700; transform: scale(1.15); }
    
    .ssize-btn {
      padding: 8px 0; font-size: 16px; border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7); color: #ccc; border-radius: 6px;
      font-family: 'Black Han Sans', sans-serif; cursor: pointer; flex: 1; text-align: center;
    }
    .ssize-btn.active { background: rgba(255, 255, 255, 0.9); color: #000; }

    .erase-tool-btn {
      padding: 12px; font-size: 18px; border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7); color: #fff; border-radius: 8px;
      font-family: 'Black Han Sans', sans-serif; cursor: pointer; flex: 1; text-align: center;
    }
    #eraser-btn.active { background: rgba(255, 200, 100, 0.9); color: #000; border-color: #ffc864; }

    @media (max-width: 768px) {
      #main-draw-area { flex-direction: column; }
      #right-sidebar { width: 100%; flex: 0 0 auto; display: block; }
      #sticker-grid { grid-template-columns: repeat(8, 1fr); }
    }

    #warning-msg {
      color: #ff5555; font-size: 20px; opacity: 0; transition: opacity 0.3s;
      position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
      white-space: nowrap; font-family: 'Black Han Sans', sans-serif;
    }

    .bottom-actions { display: flex; gap: 16px; position: relative; flex-shrink: 0; }
    .bottom-actions button {
      padding: 15px 35px; font-size: 26px; border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px; font-family: 'Black Han Sans', sans-serif; cursor: pointer;
    }
    #undo-btn { background: rgba(40, 100, 160, 0.8); color: #fff; }
    #cancel-btn { background: rgba(100, 100, 110, 0.8); color: #fff; }
    #submit-btn { background: rgba(255, 255, 255, 0.9); color: #000; box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); font-size: 30px;}

    /* 9. 펜 직관성 커서 마커 */
    #cursor-marker {
      position: absolute; pointer-events: none; border-radius: 50%; opacity: 0;
      z-index: 10000; transform: translate(-50%, -50%); transition: width 0.1s, height 0.1s, background-color 0.1s;
      border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 0 5px rgba(0,0,0,0.5); display: none;
    }
  
    .wish-card.phototime {
      z-index: 9999 !important;
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) scale(2) !important;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    #phototime-fx {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 150vw; height: 150vw;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      z-index: 9998; /* Underneath the phototime card */
      background: 
        radial-gradient(circle at 50% 50%, rgba(255,255,230,0.5) 0%, rgba(255,220,100,0.2) 20%, transparent 60%),
        conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.3) 45deg, transparent 90deg, rgba(255,255,255,0.3) 135deg, transparent 180deg, rgba(255,255,255,0.3) 225deg, transparent 270deg, rgba(255,255,255,0.3) 315deg, transparent 360deg);
      mix-blend-mode: screen;
    }
    #phototime-fx.active {
      opacity: 1;
      animation: spotlightSpin 15s linear infinite;
    }
    @keyframes spotlightSpin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
</style>
</head>
<body oncontextmenu="return false;">
  <div id="earth-ground"></div>
  <div id="scene"></div>
  <div id="phototime-fx"></div>

  <button id="download-btn">💾 원본 다운로드</button>

  <div id="main-title">포천 아트밸리 소원 우주선</div>
  <button id="fullscreen-btn">🖥️ 전체화면 시작</button>
  <button id="open-btn">소원 적어 보내기! 🚀</button>
  <div id="admin-secret-zone"></div>
  
  <div id="cursor-marker"></div>

  <div id="draw-ui">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-title">빛깔</span>
        <button class="color-btn active" style="background:#ffffff" data-color="#ffffff"></button>
        <button class="color-btn" style="background:#ff00ea" data-color="#ff00ea"></button>
        <button class="color-btn" style="background:#00d2ff" data-color="#00d2ff"></button>
        <button class="color-btn" style="background:#39ff14" data-color="#39ff14"></button>
        <button class="color-btn" style="background:#ffeb3b" data-color="#ffeb3b"></button>
        <button class="color-btn" style="background:#ff6b35" data-color="#ff6b35"></button>
      </div>
      <div class="tool-group" style="margin-left: auto;">
        <span class="tool-title">글자 굵기</span>
        <button class="size-btn" data-size="1.8">얇게</button>
        <button class="size-btn active" data-size="4.0">보통</button>
        <button class="size-btn" data-size="8.0">굵게</button>
      </div>
    </div>

    <div id="main-draw-area">
      <canvas id="draw-canvas"></canvas>

      <div id="right-sidebar">
        <span class="tool-title" style="display:block; margin-bottom:8px;">스티커 크기</span>
        <div style="display:flex; gap:6px; margin-bottom:12px;">
          <button class="ssize-btn" data-ssize="30">소</button>
          <button class="ssize-btn active" data-ssize="50">중</button>
          <button class="ssize-btn" data-ssize="80">대</button>
        </div>

        <!-- 1. 스티커 개수 절반으로 축소 (우주/밤하늘 전용) -->
        <div id="sticker-grid">
          <button class="sticker-btn" data-emoji="⭐">⭐</button>
          <button class="sticker-btn" data-emoji="🌙">🌙</button>
          <button class="sticker-btn" data-emoji="🚀">🚀</button>
          <button class="sticker-btn" data-emoji="🪐">🪐</button>
          <button class="sticker-btn" data-emoji="🛸">🛸</button>
          <button class="sticker-btn" data-emoji="🌍">🌍</button>
          <button class="sticker-btn" data-emoji="🛰️">🛰️</button>
          <button class="sticker-btn" data-emoji="✨">✨</button>
        </div>

        <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.2); margin:12px 0;">

        <span class="tool-title" style="display:block; margin-bottom:8px;">지우기 도구</span>
        <div style="display:flex; gap:8px;">
          <button id="eraser-btn" class="erase-tool-btn">🧹 지우개</button>
          <button id="clear-btn" class="erase-tool-btn" style="background: rgba(255, 100, 100, 0.4);">🗑️ 모두 싹</button>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <div id="warning-msg">소원을 먼저 그려야 우주로 보낼 수 있습니다!</div>
      <!-- 11. Undo 뒤로가기 버튼 -->
      <button id="undo-btn">↩️ 되돌리기</button>
      <button id="cancel-btn">접기</button>
      <button id="submit-btn">우주로 발사 ✨</button>
    </div>
  </div>

  <script>
    // -----------------------------------------
    // 1. 유틸 UI 로직
    // -----------------------------------------
    document.getElementById('download-btn').addEventListener('click', () => {
      const clone = document.documentElement.cloneNode(true);
      clone.querySelector('#scene').innerHTML = '';
      clone.querySelector('body').classList.remove('admin-mode');
      clone.querySelector('#draw-ui').classList.remove('open');
      const blob = new Blob(['<!DOCTYPE html>\n<html lang="ko">\n' + clone.innerHTML + '\n</html>'], { type: 'text/html;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'artvalley_bg_spaceships.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement)
        document.documentElement.requestFullscreen().then(() => fsBtn.style.display = 'none').catch(e => alert(e));
    });

    // -----------------------------------------
    // 2. 그리기 캔버스 및 마커 로직
    // -----------------------------------------
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const cursorMarker = document.getElementById('cursor-marker');
    let isDrawing = false, hasDrawn = false;
    let penColor = '#ffffff', penSize = 4.0;
    let eraserMode = false, stickerMode = false, currentSticker = '', stickerSize = 50;
    
    // 11. 실행취소(Undo) 로직용 배열
    let drawHistory = [];

    function saveHistory() {
      if(drawHistory.length > 20) drawHistory.shift();
      drawHistory.push(canvas.toDataURL());
    }
    
    document.getElementById('undo-btn').addEventListener('click', () => {
      resetIdleTimer();
      if(drawHistory.length > 0) {
        const img = new Image();
        img.src = drawHistory.pop();
        img.onload = () => {
          ctx.clearRect(0,0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
      } else {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        hasDrawn = false;
      }
    });

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const W = Math.round(rect.width), H = Math.round(rect.height);
      if (canvas.width !== W || canvas.height !== H) {
        const tmpData = canvas.toDataURL();
        canvas.width = W; canvas.height = H;
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0); applyCtxStyle(); };
        img.src = tmpData;
      }
    }

    function applyCtxStyle() {
      ctx.strokeStyle = eraserMode ? 'rgba(0,0,0,1)' : penColor;
      ctx.lineWidth = eraserMode ? penSize * 5 : penSize * 1.5;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.globalCompositeOperation = eraserMode ? 'destination-out' : 'source-over';
      ctx.shadowBlur = eraserMode ? 0 : 5;
      ctx.shadowColor = penColor;
      
      // 9. 마커 스타일 업데이트
      if(!stickerMode) {
        cursorMarker.style.width = (ctx.lineWidth) + 'px';
        cursorMarker.style.height = (ctx.lineWidth) + 'px';
        cursorMarker.style.backgroundColor = eraserMode ? 'rgba(255,255,255,0.7)' : penColor;
      }
    }

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        penColor = btn.dataset.color;
        
        eraserMode = false; stickerMode = false; cursorMarker.style.display = 'block';
        document.getElementById('eraser-btn').classList.remove('active');
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));

        canvas.className = ''; applyCtxStyle();
        document.getElementById('submit-btn').style.background = penColor;
        document.getElementById('draw-ui').style.borderColor = penColor;
      });
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        penSize = parseFloat(btn.dataset.size);
        applyCtxStyle();
      });
    });

    const eraserBtn = document.getElementById('eraser-btn');
    eraserBtn.addEventListener('click', () => {
      eraserMode = !eraserMode; stickerMode = false;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      eraserBtn.classList.toggle('active', eraserMode);
      canvas.className = eraserMode ? 'eraser-mode' : '';
      applyCtxStyle();
      cursorMarker.style.display = 'block';
    });

    document.querySelectorAll('.ssize-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ssize-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        stickerSize = parseInt(btn.dataset.ssize);
      });
    });

    document.querySelectorAll('.sticker-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const same = stickerMode && currentSticker === btn.dataset.emoji;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        eraserMode = false; eraserBtn.classList.remove('active');

        if (same) {
          stickerMode = false; canvas.className = ''; cursorMarker.style.display = 'block';
        } else {
          stickerMode = true; currentSticker = btn.dataset.emoji;
          btn.classList.add('active'); canvas.className = 'sticker-mode'; cursorMarker.style.display = 'none';
        }
        applyCtxStyle();
      });
    });

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height), cx, cy };
    }
    
    document.addEventListener('mousemove', (e) => {
      if(stickerMode) return;
      cursorMarker.style.left = e.clientX + 'px'; cursorMarker.style.top = e.clientY + 'px';
    });
    document.addEventListener('touchmove', (e) => {
      if(stickerMode) return;
      if(e.touches) { cursorMarker.style.left = e.touches[0].clientX + 'px'; cursorMarker.style.top = e.touches[0].clientY + 'px'; }
    });
    
    canvas.addEventListener('mouseenter', () => { if(!stickerMode) { cursorMarker.style.opacity = '1'; cursorMarker.style.display = 'block'; }applyCtxStyle(); });
    canvas.addEventListener('mouseleave', () => cursorMarker.style.opacity = '0');

    function placeSticker(e) {
      saveHistory(); // Save before drawing
      const p = getPos(e);
      ctx.save(); ctx.globalCompositeOperation = 'source-over'; ctx.shadowBlur = 0;
      ctx.font = stickerSize + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(currentSticker, p.x, p.y);
      ctx.restore();
      hasDrawn = true; document.getElementById('warning-msg').style.opacity = '0';
      
      // 2. 스티커 1회용 토글 로직
      stickerMode = false; 
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      canvas.className = '';
      cursorMarker.style.display = 'block';
      cursorMarker.style.opacity = '1';
      applyCtxStyle();
    }

    function startDraw(e) {
      if(e.type === 'touchstart') e.preventDefault(); 
      resetIdleTimer();
      if (stickerMode) { placeSticker(e); return; }
      saveHistory(); // Save before drawing line
      isDrawing = true; applyCtxStyle();
      const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
      cursorMarker.style.opacity = '1';
    }
    
    function doDraw(e) {
      if(e.type === 'touchmove') e.preventDefault();
      if (stickerMode || !isDrawing) return;
      resetIdleTimer(); hasDrawn = true;
      const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
      document.getElementById('warning-msg').style.opacity = '0';
    }
    function endDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', doDraw); window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false }); canvas.addEventListener('touchmove', doDraw, { passive: false }); window.addEventListener('touchend', endDraw);

    document.getElementById('clear-btn').addEventListener('click', () => {
      saveHistory();
      ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; resetIdleTimer();
    });

    // 10. 자동 초기화 로직
    const drawUI = document.getElementById('draw-ui');
    const openBtn = document.getElementById('open-btn');
    let idleTimer;

    function closeDrawUI() { drawUI.classList.remove('open'); openBtn.style.transform = 'translateX(-50%)'; clearTimeout(idleTimer); cursorMarker.style.opacity = '0'; }
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      // 30초 무반응 시 초기화
      if (drawUI.classList.contains('open')) idleTimer = setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); drawHistory = []; hasDrawn = false; closeDrawUI(); }, 30000);
    }

    openBtn.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height); drawHistory = []; hasDrawn = false;
      document.getElementById('warning-msg').style.opacity = '0'; drawUI.classList.add('open'); openBtn.style.transform = 'translate(-50%, 300px)';
      resetIdleTimer();
      requestAnimationFrame(() => requestAnimationFrame(resizeCanvas));
    });
    document.getElementById('cancel-btn').addEventListener('click', closeDrawUI);
    window.addEventListener('resize', () => { if (drawUI.classList.contains('open')) resizeCanvas(); updateGridDimensions(); });


    // -----------------------------------------
    // 3. 우주선 체류/배치/저장 알고리즘 (5. 6. 7. 8. 12. 14 반영)
    // -----------------------------------------
    const scene = document.getElementById('scene');
    let allWishes = []; 
    // 로컬 스토리지에 저장해서 세로고침 보호
    const STORAGE_KEY = 'artvalley_wishes';

    // 5. 그리드 시스템
    const MAX_WISHES = 12;
    const colorPalette = ["#ff00ea", "#00d2ff", "#39ff14", "#ffeb3b", "#ff6b35", "#b15cff", "#ff5c8d", "#5cffda"];
    
    
    function saveToLocalStorage() {
      const data = allWishes.map(w => ({ img: w.imgSrc, color: w.color, finalX: w.finalX, finalY: w.finalY, shipId: w.shipId }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    
    function loadFromLocalStorage() {
      const svd = localStorage.getItem(STORAGE_KEY);
      if(!svd) return;
      try {
        const data = JSON.parse(svd);
        data.forEach(d => {
          createWishElement(d, d.finalX, d.finalY, true); // 바로 배치
        });
      } catch(e) {}
    }



    
    // 1. Auto Crop Canvas Function
    function cropCanvas(sourceCanvas, padding = 30) {
      const ctx = sourceCanvas.getContext('2d');
      const w = sourceCanvas.width;
      const h = sourceCanvas.height;
      const data = ctx.getImageData(0, 0, w, h).data;
      
      let minX = w, minY = h, maxX = 0, maxY = 0;
      let drawn = false;
      
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const alpha = data[(y * w + x) * 4 + 3];
          if (alpha > 0) {
            drawn = true;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      
      if (!drawn) return sourceCanvas.toDataURL('image/webp', 0.6); // Empty
      
      // Apply Padding
      minX = Math.max(0, minX - padding);
      minY = Math.max(0, minY - padding);
      maxX = Math.min(w, maxX + padding);
      maxY = Math.min(h, maxY + padding);
      
      const width = maxX - minX;
      const height = maxY - minY;
      
      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = width;
      cropCanvas.height = height;
      const cropCtx = cropCanvas.getContext('2d');
      
      cropCtx.drawImage(
        sourceCanvas,
        minX, minY, width, height,
        0, 0, width, height
      );
      
      return cropCanvas.toDataURL('image/webp', 0.8);
    }

    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!hasDrawn) { document.getElementById('warning-msg').style.opacity = '1'; return; }
      const dataURL = cropCanvas(canvas, 30); // 1. Auto Crop Applied
      closeDrawUI();
      launchNewWish(dataURL);
    });

    
    // 신규 소원 발사
    function launchNewWish(imgSrc) {
      const randomColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
      
      let valid = false, fx = 0, fy = 0;
      let wW = window.innerWidth, wH = window.innerHeight;
      
      for(let i=0; i<100; i++) {
        // 화면 가장자리 여백 확보
        fx = 150 + Math.random() * (wW - 300);
        fy = 100 + Math.random() * (wH - 250);
        
        let cx = wW / 2, cy = wH / 2;
        
        // 중앙 포토타임 존 회피
        if(Math.abs(fx - cx) < 350 && Math.abs(fy - cy) < 250) continue;
        // 하단 UI 버튼 영역 회피
        if(fy > wH - 200 && Math.abs(fx - cx) < 400) continue;
        
        // 겹침 체크
        let overlap = false;
        for(let w of allWishes) {
          if(!w.el.classList.contains('departing') && Math.abs(fx - w.finalX) < 280 && Math.abs(fy - w.finalY) < 180) {
            overlap = true; break;
          }
        }
        if(!overlap) { valid = true; break; }
      }
      
      if(!valid || allWishes.length >= MAX_WISHES) {
        // 자리 없거나 최대 개수 초과 시 가장 오래된 것 삭제 (퇴장 애니메이션)
        const oldest = allWishes[0];
        if(oldest) {
          oldest.el.classList.add('departing');
          allWishes.shift();
          setTimeout(() => { try { oldest.el.remove(); } catch(e){} }, 2000);
        }
        // 삭제 후 자리 확보 없이 그냥 마지막에 구한 좌표(무작위 중복)에 발사
      }
      
      const dataInfo = { img: imgSrc, color: randomColor, shipId: (Math.floor(Math.random() * 3) + 1) };
      createWishElement(dataInfo, fx, fy, false);
    }
    
    function createWishElement(data, finalX, finalY, immediate) {
      const card = document.createElement('div');
      card.className = 'wish-card';
      card.style.border = `3px solid ${data.color}`;
      card.style.boxShadow = `0 0 25px ${data.color}80`;
      // 말풍선의 전체 배경을 반투명 랜덤 색상으로 부여
      card.style.backgroundColor = data.color + '40'; // 25% opacity hex
      card.style.backdropFilter = 'blur(4px)'; // 살짝 블러
      card.style.webkitBackdropFilter = 'blur(4px)';
      
      card.innerHTML = `
        <div class="speech-tail" style="border-top:16px solid ${data.color};"></div>
        <img src="${data.img}" style="pointer-events: auto;">
        <div class="drone-base" style="background:url('assets/ship${data.shipId}_bg.png') center/contain no-repeat;">
          <div class="drone-thruster" style="background:radial-gradient(circle,#fff 10%,${data.color} 60%,transparent 100%);"></div>
          <div class="drone-thruster" style="background:radial-gradient(circle,#fff 10%,${data.color} 60%,transparent 100%);"></div>
        </div>`;
      
      scene.appendChild(card);
      
      const wishObj = { el: card, createdAt: Date.now(), finalX: finalX, finalY: finalY, imgSrc: data.img, color: data.color, shipId: data.shipId };
      allWishes.push(wishObj);
      saveToLocalStorage();
      
      // 관리자 핸들러 & 포토타임
      let isPhotoTime = false;
      let originalLeft, originalTop, originalTransform;
      card.addEventListener('click', () => {
        if (isAdminMode) { 
          card.remove(); 
          allWishes = allWishes.filter(w => w !== wishObj); 
          saveToLocalStorage();
        } else {
          const fxLayer = document.getElementById('phototime-fx');
          isPhotoTime = !isPhotoTime;
          if (isPhotoTime) {
            originalLeft = card.style.left;
            originalTop = card.style.top;
            originalTransform = card.style.transform;
            card.classList.add('phototime');
            card.classList.remove('floating');
            fxLayer.classList.add('active'); 
            
            setTimeout(() => {
              if(isPhotoTime && document.body.contains(card)) {
                isPhotoTime = false;
                card.classList.remove('phototime');
                card.classList.add('floating');
                fxLayer.classList.remove('active');
              }
            }, 5000);
          } else {
            card.classList.remove('phototime');
            card.classList.add('floating');
            fxLayer.classList.remove('active');
          }
        }
      });

      if(immediate) {
        card.style.left = finalX + 'px'; card.style.transform = 'translate(-50%, -50%)';  
        card.style.top = finalY + 'px';
        card.classList.add('floating');
      } else {
        card.style.zIndex = 10;
        card.style.left = (window.innerWidth / 2) + 'px';
        card.style.top = (window.innerHeight + 200) + 'px'; 
        card.style.transform = 'translate(-50%, -50%) scale(0.3)';

        const pInterval = setInterval(() => {
          const r = card.getBoundingClientRect();
          const p = document.createElement('div'); p.className = 'particle';
          p.style.width = (Math.random() * 10 + 5) + 'px'; p.style.height = p.style.width;
          p.style.background = data.color; p.style.boxShadow = `0 0 10px ${data.color}`;
          p.style.left = (r.left + r.width/2 + (Math.random()*40-20)) + 'px';
          p.style.top = (r.top + r.height + (Math.random()*20)) + 'px';
          scene.appendChild(p);
          setTimeout(() => p.remove(), 1200);
        }, 120);

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            card.style.left = finalX + 'px'; card.style.transform = 'translate(-50%, -50%) scale(1)';
            card.style.top = finalY + 'px';
            setTimeout(() => {
              clearInterval(pInterval);
              card.style.transform = 'translate(-50%, -50%)';
              card.classList.add('floating'); 
            }, 2500);
          });
        });
      }
    }


    // 초기화 과정
    loadFromLocalStorage();

    // 14. 관리자 모드 (안전하게 유지보수)
    let adminClicks = 0, adminTimer, isAdminMode = false;
    document.getElementById('admin-secret-zone').addEventListener('click', () => {
      adminClicks++; clearTimeout(adminTimer); adminTimer = setTimeout(() => adminClicks = 0, 2000);
      if (adminClicks >= 5) {
        isAdminMode = !isAdminMode; adminClicks = 0;
        document.body.classList.toggle('admin-mode', isAdminMode);
        alert(isAdminMode ? '⚠️ [관리자 모드 켜짐]\n다운로드하거나 소원 카드를 터치해 안전하게 삭제하세요.' : '✅ [관리자 모드 꺼짐]');
      }
    });
  </script>
</body>
