<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>소원 우주선</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: url('assets/new_bg.webp') center/cover no-repeat;
      background-color: #050d21;
      overflow: hidden;
      font-family: 'Nanum Pen Script', cursive;
      user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }

    body.admin-mode {
      border: 5px solid #ff0000;
    }

    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    #main-title {
      position: absolute;
      top: 30px;
      left: 40px;
      z-index: 200;
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 40px;
      letter-spacing: 3px;
    }

    #fullscreen-btn,
    #download-btn {
      position: absolute;
      z-index: 1000;
      padding: 10px 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      border-radius: 8px;
      font-size: 18px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    #fullscreen-btn {
      top: 25px;
      right: 25px;
      background: rgba(50, 50, 50, 0.8);
    }

    #download-btn {
      top: 25px;
      left: 25px;
      background: rgba(0, 150, 75, 0.8);
      display: none;
    }

    body.admin-mode #download-btn {
      display: block;
    }

    #admin-secret-zone {
      position: absolute;
      top: 0;
      right: 0;
      width: 150px;
      height: 150px;
      z-index: 1000;
    }

    /* ── 우주선 덩어리 구조 ── */
    .wish-wrap {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      will-change: transform;
      z-index: 10;
    }

    .wish-wrap:active {
      cursor: grabbing;
    }

    body.admin-mode .wish-wrap {
      cursor: pointer;
    }

    .bubble {
      position: relative;
      background: rgba(10, 15, 30, 0.95);
      border-radius: 16px;
      padding: 10px;
      width: max-content;
      min-width: 100px;
      max-width: 200px;
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bubble img {
      max-width: 100%;
      max-height: 100px;
      object-fit: contain;
      pointer-events: none;
    }

    .tail {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
    }

    .ship {
      width: 180px;
      height: 80px;
      margin-top: 15px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      pointer-events: none;
    }

    .thruster {
      position: absolute;
      bottom: -10px;
      width: 20px;
      height: 30px;
      border-radius: 50%;
      background: #fff;
      animation: thrust 0.3s infinite alternate;
    }

    .thruster.left {
      left: 45px;
    }

    .thruster.right {
      right: 45px;
    }

    @keyframes thrust {
      0% {
        transform: scale(0.8);
        opacity: 0.7;
      }

      100% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    .wish-wrap.departing {
      pointer-events: none;
      transition: transform 2s ease-in, opacity 2s ease-in !important;
      transform: translate3d(50vw, -150vh, 0) rotate(25deg) scale(1) !important;
      opacity: 0 !important;
    }

    /* ── Launch Button ── */
    #open-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 70px;
      font-size: 40px;
      background: rgba(20, 30, 50, 0.9);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 60px;
      cursor: pointer;
      z-index: 100;
      font-family: 'Black Han Sans', sans-serif;
      transition: transform .3s;
    }

    /* ── Draw UI ── */
    #draw-ui {
      position: absolute;
      bottom: -600px;
      left: 50%;
      transform: translateX(-50%);
      width: 1000px;
      height: 520px;
      background: rgba(5, 10, 20, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-bottom: none;
      border-radius: 24px 24px 0 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: bottom 0.4s cubic-bezier(.2, .8, .2, 1);
      overflow: hidden;
    }

    #draw-ui.open {
      bottom: 0;
    }

    #toolbar {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 12px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-title {
      color: #fff;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 18px;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      cursor: pointer;
    }

    .color-btn.active {
      transform: scale(1.3);
      border-color: #fff;
    }

    .size-btn {
      padding: 8px 16px;
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7);
      color: #ccc;
      border-radius: 8px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    .size-btn.active {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      border-color: #fff;
    }

    #main-draw-area {
      display: flex;
      flex-direction: row;
      width: 100%;
      flex: 1 1 auto;
      gap: 16px;
      margin-bottom: 16px;
      min-height: 0;
    }

    #draw-canvas {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      flex: 1 1 0;
      min-width: 0;
      min-height: 200px;
      touch-action: none;
      cursor: crosshair;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    #right-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sticker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .sticker-btn {
      font-size: 26px;
      width: 100%;
      height: 46px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
    }

    .sticker-btn.active {
      background: rgba(255, 220, 80, 0.4);
      border-color: #ffd700;
      transform: scale(1.15);
    }

    .ssize-btn {
      padding: 8px 0;
      font-size: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7);
      color: #ccc;
      border-radius: 6px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .ssize-btn.active {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
    }

    .erase-tool-btn {
      padding: 12px;
      font-size: 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(30, 30, 40, 0.7);
      color: #fff;
      border-radius: 8px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    #eraser-btn.active {
      background: rgba(255, 200, 100, 0.9);
      color: #000;
      border-color: #ffc864;
    }

    #warning-msg {
      color: #ff5555;
      font-size: 20px;
      opacity: 0;
      transition: opacity .3s;
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Black Han Sans', sans-serif;
    }

    .bottom-actions {
      display: flex;
      gap: 16px;
      position: relative;
      flex-shrink: 0;
    }

    .bottom-actions button {
      padding: 15px 35px;
      font-size: 26px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      font-family: 'Black Han Sans', sans-serif;
      cursor: pointer;
    }

    #undo-btn {
      background: rgba(40, 100, 160, 0.8);
      color: #fff;
    }

    #cancel-btn {
      background: rgba(100, 100, 110, 0.8);
      color: #fff;
    }

    #submit-btn {
      background: rgba(255, 255, 255, 0.9);
      color: #000;
      font-size: 30px;
    }

    #cursor-marker {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      opacity: 0;
      z-index: 10000;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      display: none;
    }
  </style>
</head>

<body oncontextmenu="return false;">
  <div id="scene"></div>

  <button id="download-btn">원본 다운로드</button>
  <div id="main-title">소원 우주선</div>
  <button id="fullscreen-btn">전체화면 시작</button>
  <button id="open-btn">소원 적어 보내기!</button>
  <div id="admin-secret-zone"></div>
  <div id="cursor-marker"></div>

  <div id="draw-ui">
    <div id="toolbar">
      <div class="tool-group">
        <span class="tool-title">빛깔</span>
        <button class="color-btn active" style="background:#ffffff" data-color="#ffffff"></button>
        <button class="color-btn" style="background:#ff00ea" data-color="#ff00ea"></button>
        <button class="color-btn" style="background:#00d2ff" data-color="#00d2ff"></button>
        <button class="color-btn" style="background:#39ff14" data-color="#39ff14"></button>
        <button class="color-btn" style="background:#ffeb3b" data-color="#ffeb3b"></button>
        <button class="color-btn" style="background:#ff6b35" data-color="#ff6b35"></button>
      </div>
      <div class="tool-group" style="margin-left:auto;">
        <span class="tool-title">글자 굵기</span>
        <button class="size-btn" data-size="1.8">얇게</button>
        <button class="size-btn active" data-size="4.0">보통</button>
        <button class="size-btn" data-size="8.0">굵게</button>
      </div>
    </div>

    <div id="main-draw-area">
      <canvas id="draw-canvas"></canvas>
      <div id="right-sidebar">
        <span class="tool-title" style="display:block;margin-bottom:8px;">스티커 크기</span>
        <div style="display:flex;gap:6px;margin-bottom:12px;">
          <button class="ssize-btn" data-ssize="30">소</button>
          <button class="ssize-btn active" data-ssize="50">중</button>
          <button class="ssize-btn" data-ssize="80">대</button>
        </div>
        <div id="sticker-grid">
          <button class="sticker-btn" data-emoji="⭐">⭐</button>
          <button class="sticker-btn" data-emoji="🌙">🌙</button>
          <button class="sticker-btn" data-emoji="🚀">🚀</button>
          <button class="sticker-btn" data-emoji="🪐">🪐</button>
          <button class="sticker-btn" data-emoji="🛸">🛸</button>
          <button class="sticker-btn" data-emoji="🌍">🌍</button>
          <button class="sticker-btn" data-emoji="🛰️">🛰️</button>
          <button class="sticker-btn" data-emoji="✨">✨</button>
        </div>
        <hr style="width:100%;border:0;border-top:1px solid rgba(255,255,255,0.2);margin:12px 0;">
        <span class="tool-title" style="display:block;margin-bottom:8px;">지우기 도구</span>
        <div style="display:flex;gap:8px;">
          <button id="eraser-btn" class="erase-tool-btn">지우개</button>
          <button id="clear-btn" class="erase-tool-btn" style="background:rgba(255,100,100,0.4);">모두 싹</button>
        </div>
      </div>
    </div>

    <div class="bottom-actions">
      <div id="warning-msg">소원을 먼저 그려야 우주로 보낼 수 있습니다!</div>
      <button id="undo-btn">되돌리기</button>
      <button id="cancel-btn">접기</button>
      <button id="submit-btn">우주로 발사</button>
    </div>
  </div>

  <script>
    // 유틸리티 기능
    document.getElementById('download-btn').addEventListener('click', () => {
      const clone = document.documentElement.cloneNode(true);
      clone.querySelector('#scene').innerHTML = '';
      clone.querySelector('body').classList.remove('admin-mode');
      clone.querySelector('#draw-ui').classList.remove('open');
      const blob = new Blob(['<!DOCTYPE html>\n<html lang="ko">\n' + clone.innerHTML + '\n</html>'], { type: 'text/html;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'wishes.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    });

    const fsBtn = document.getElementById('fullscreen-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement)
        document.documentElement.requestFullscreen().then(() => fsBtn.style.display = 'none').catch(e => alert(e));
    });

    // 캔버스 그리기 기능
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const cursorMarker = document.getElementById('cursor-marker');
    let isDrawing = false, hasDrawn = false;
    let penColor = '#ffffff', penSize = 4.0;
    let eraserMode = false, stickerMode = false, currentSticker = '', stickerSize = 50;
    let drawHistory = [];

    function saveHistory() {
      if (drawHistory.length > 5) drawHistory.shift();
      drawHistory.push(canvas.toDataURL());
    }

    document.getElementById('undo-btn').addEventListener('click', () => {
      resetIdleTimer();
      if (drawHistory.length > 0) {
        const img = new Image();
        img.src = drawHistory.pop();
        img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false;
      }
    });

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const W = Math.round(rect.width), H = Math.round(rect.height);
      if (canvas.width !== W || canvas.height !== H) {
        const tmpData = canvas.toDataURL();
        canvas.width = W; canvas.height = H;
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0); applyCtxStyle(); };
        img.src = tmpData;
      }
    }

    function applyCtxStyle() {
      ctx.strokeStyle = eraserMode ? 'rgba(0,0,0,1)' : penColor;
      ctx.lineWidth = eraserMode ? penSize * 5 : penSize * 1.5;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.globalCompositeOperation = eraserMode ? 'destination-out' : 'source-over';
      if (!stickerMode) {
        cursorMarker.style.width = ctx.lineWidth + 'px';
        cursorMarker.style.height = ctx.lineWidth + 'px';
        cursorMarker.style.backgroundColor = eraserMode ? 'rgba(255,255,255,0.7)' : penColor;
      }
    }

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); penColor = btn.dataset.color;
        eraserMode = false; stickerMode = false; cursorMarker.style.display = 'block';
        document.getElementById('eraser-btn').classList.remove('active');
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        canvas.className = ''; applyCtxStyle();
        document.getElementById('submit-btn').style.background = penColor;
        document.getElementById('draw-ui').style.borderColor = penColor;
      });
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); penSize = parseFloat(btn.dataset.size); applyCtxStyle();
      });
    });

    const eraserBtn = document.getElementById('eraser-btn');
    eraserBtn.addEventListener('click', () => {
      eraserMode = !eraserMode; stickerMode = false;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      eraserBtn.classList.toggle('active', eraserMode);
      canvas.className = eraserMode ? 'eraser-mode' : '';
      applyCtxStyle(); cursorMarker.style.display = 'block';
    });

    document.querySelectorAll('.ssize-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ssize-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); stickerSize = parseInt(btn.dataset.ssize);
      });
    });

    document.querySelectorAll('.sticker-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const same = stickerMode && currentSticker === btn.dataset.emoji;
        document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
        eraserMode = false; eraserBtn.classList.remove('active');
        if (same) {
          stickerMode = false; canvas.className = ''; cursorMarker.style.display = 'block';
        } else {
          stickerMode = true; currentSticker = btn.dataset.emoji;
          btn.classList.add('active'); canvas.className = 'sticker-mode'; cursorMarker.style.display = 'none';
        }
        applyCtxStyle();
      });
    });

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height), cx, cy };
    }

    document.addEventListener('mousemove', e => {
      if (stickerMode) return;
      cursorMarker.style.left = e.clientX + 'px'; cursorMarker.style.top = e.clientY + 'px';
    });
    document.addEventListener('touchmove', e => {
      if (stickerMode || !e.touches) return;
      cursorMarker.style.left = e.touches[0].clientX + 'px'; cursorMarker.style.top = e.touches[0].clientY + 'px';
    });

    canvas.addEventListener('mouseenter', () => { if (!stickerMode) { cursorMarker.style.opacity = '1'; cursorMarker.style.display = 'block'; } applyCtxStyle(); });
    canvas.addEventListener('mouseleave', () => cursorMarker.style.opacity = '0');

    function placeSticker(e) {
      saveHistory();
      const p = getPos(e);
      ctx.save(); ctx.globalCompositeOperation = 'source-over';
      ctx.font = stickerSize + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(currentSticker, p.x, p.y); ctx.restore();
      hasDrawn = true; document.getElementById('warning-msg').style.opacity = '0';
      stickerMode = false;
      document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
      canvas.className = ''; cursorMarker.style.display = 'block'; cursorMarker.style.opacity = '1';
      applyCtxStyle();
    }

    function startDraw(e) {
      if (e.type === 'touchstart') e.preventDefault();
      resetIdleTimer();
      if (stickerMode) { placeSticker(e); return; }
      saveHistory(); isDrawing = true; applyCtxStyle();
      const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
      cursorMarker.style.opacity = '1';
    }
    function doDraw(e) {
      if (e.type === 'touchmove') e.preventDefault();
      if (stickerMode || !isDrawing) return;
      resetIdleTimer(); hasDrawn = true;
      const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
      document.getElementById('warning-msg').style.opacity = '0';
    }
    function endDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', doDraw);
    window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', doDraw, { passive: false });
    window.addEventListener('touchend', endDraw);

    document.getElementById('clear-btn').addEventListener('click', () => {
      saveHistory(); ctx.clearRect(0, 0, canvas.width, canvas.height); hasDrawn = false; resetIdleTimer();
    });

    const drawUI = document.getElementById('draw-ui');
    const openBtn = document.getElementById('open-btn');
    let idleTimer;

    function closeDrawUI() {
      drawUI.classList.remove('open');
      openBtn.style.transform = 'translateX(-50%)';
      clearTimeout(idleTimer);
      cursorMarker.style.opacity = '0';
    }
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      if (drawUI.classList.contains('open'))
        idleTimer = setTimeout(() => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drawHistory = []; hasDrawn = false; closeDrawUI();
        }, 30000);
    }

    openBtn.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height); drawHistory = []; hasDrawn = false;
      document.getElementById('warning-msg').style.opacity = '0';
      drawUI.classList.add('open');
      openBtn.style.transform = 'translate(-50%,300px)';
      resetIdleTimer();
      requestAnimationFrame(() => requestAnimationFrame(resizeCanvas));
    });
    document.getElementById('cancel-btn').addEventListener('click', closeDrawUI);
    window.addEventListener('resize', () => {
      if (drawUI.classList.contains('open')) resizeCanvas();
    });

    function cropCanvas(src, padding = 10) {
      const c = src.getContext('2d'), w = src.width, h = src.height;
      const data = c.getImageData(0, 0, w, h).data;
      let minX = w, minY = h, maxX = 0, maxY = 0, drawn = false;
      for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
        if (data[(y * w + x) * 4 + 3] > 0) { drawn = true; if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
      }
      if (!drawn) return src.toDataURL('image/webp', 0.6);
      minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
      maxX = Math.min(w, maxX + padding); maxY = Math.min(h, maxY + padding);
      const cc = document.createElement('canvas');
      cc.width = maxX - minX; cc.height = maxY - minY;
      cc.getContext('2d').drawImage(src, minX, minY, cc.width, cc.height, 0, 0, cc.width, cc.height);
      return cc.toDataURL('image/webp', 0.8);
    }

    // ── 물리 엔진 및 로직 ──
    const PHYSICS = {
      MAX_WISHES: 16,
      GRID_COLS: 4,
      GRID_ROWS: 4,
      REPULSION_FORCE: 0.002,
      MIN_DIST: 220,
      SPRING_K: 0.015,
      DAMPING: 0.85,
      FLOAT_AMP: 7,
      FLOAT_SPEED: 0.018,
      BOUNDARY_TOP: 100,
      BOUNDARY_SIDE: 150,
      BOUNDARY_K: 0.1,
      COLOR_PALETTE: ["#ff00ea", "#00d2ff", "#39ff14", "#ffeb3b", "#ff6b35", "#b15cff", "#ff5c8d", "#5cffda"],
    };

    const scene = document.getElementById('scene');
    let allWishes = [];
    let rafId = null;
    let lastTs = 0;

    function bottomSafe() { return window.innerHeight - Math.max(200, window.innerHeight * 0.22); }

    function getBestTarget() {
      const wW = window.innerWidth, wH = window.innerHeight;
      const top = PHYSICS.BOUNDARY_TOP + 30;
      const bot = bottomSafe() - 100;
      const left = PHYSICS.BOUNDARY_SIDE;
      const right = wW - PHYSICS.BOUNDARY_SIDE;
      const cellW = (right - left) / PHYSICS.GRID_COLS;
      const cellH = (bot - top) / PHYSICS.GRID_ROWS;

      const grid = Array.from({ length: PHYSICS.GRID_ROWS }, () => new Array(PHYSICS.GRID_COLS).fill(0));
      allWishes.forEach(w => {
        if (w.departing) return;
        const col = Math.floor((w.targetX - left) / cellW);
        const row = Math.floor((w.targetY - top) / cellH);
        const c = Math.max(0, Math.min(PHYSICS.GRID_COLS - 1, col));
        const r = Math.max(0, Math.min(PHYSICS.GRID_ROWS - 1, row));
        grid[r][c]++;
      });

      let minCount = Infinity;
      grid.forEach(row => row.forEach(v => { if (v < minCount) minCount = v; }));
      const candidates = [];
      grid.forEach((row, r) => row.forEach((v, c) => { if (v === minCount) candidates.push({ r, c }); }));

      const ch = candidates[Math.floor(Math.random() * candidates.length)];
      const tx = left + (ch.c + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.4;
      const ty = top + (ch.r + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.4;

      return {
        x: Math.max(left, Math.min(right, tx)),
        y: Math.max(top, Math.min(bottomSafe() - 100, ty)),
      };
    }

    function physicsLoop(ts) {
      const dt = Math.min(32, ts - lastTs) / 16.67;
      lastTs = ts;
      const wW = window.innerWidth;
      const bot = bottomSafe();

      for (let i = 0; i < allWishes.length; i++) {
        const w = allWishes[i];
        if (w.departing) continue;

        w.phase += PHYSICS.FLOAT_SPEED;

        // 크기(스케일)를 자바스크립트로 부드럽게 조절 (렉 방지 핵심)
        w.scale += (w.targetScale - w.scale) * 0.08 * dt;

        // 드래그 중이 아니고 초기 강조(phototime) 상태가 아닐 때만 이동
        if (!w.dragging && !w.phototime) {
          w.vx += (w.targetX - w.x) * PHYSICS.SPRING_K * dt;
          w.vy += (w.targetY - w.y) * PHYSICS.SPRING_K * dt;

          for (let j = 0; j < allWishes.length; j++) {
            if (i === j || allWishes[j].departing || allWishes[j].phototime) continue;
            const o = allWishes[j];
            const dx = w.x - o.x;
            const dy = w.y - o.y;
            const distSq = dx * dx + dy * dy;

            if (distSq < PHYSICS.MIN_DIST * PHYSICS.MIN_DIST && distSq > 0) {
              const dist = Math.sqrt(distSq);
              const force = (PHYSICS.MIN_DIST - dist) * PHYSICS.REPULSION_FORCE * dt;
              w.vx += (dx / dist) * force;
              w.vy += (dy / dist) * force;
            }
          }

          const bk = PHYSICS.BOUNDARY_K * dt;
          if (w.x < PHYSICS.BOUNDARY_SIDE) w.vx += (PHYSICS.BOUNDARY_SIDE - w.x) * bk;
          if (w.x > wW - PHYSICS.BOUNDARY_SIDE) w.vx -= (w.x - (wW - PHYSICS.BOUNDARY_SIDE)) * bk;
          if (w.y < PHYSICS.BOUNDARY_TOP) w.vy += (PHYSICS.BOUNDARY_TOP - w.y) * bk;
          if (w.y > bot) w.vy -= (w.y - bot) * bk;
        }

        if (!w.dragging) {
          w.vx *= Math.pow(PHYSICS.DAMPING, dt);
          w.vy *= Math.pow(PHYSICS.DAMPING, dt);
          w.x += w.vx * dt;
          w.y += w.vy * dt;
        }

        // 스케일이 크거나 드래그 중일 때는 맨 위로 오도록 Z-index 조정
        w.el.style.zIndex = (w.scale > 1.1 || w.dragging) ? '500' : '10';

        const floatY = Math.sin(w.phase) * PHYSICS.FLOAT_AMP;
        const floatR = Math.sin(w.phase * 0.7) * 2;

        w.el.style.transform = `translate3d(${w.x}px, ${w.y + floatY}px, 0) translate(-50%, -50%) scale(${w.scale}) rotate(${floatR}deg)`;
      }

      rafId = requestAnimationFrame(physicsLoop);
    }

    rafId = requestAnimationFrame(t => { lastTs = t; physicsLoop(t); });

    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!hasDrawn) { document.getElementById('warning-msg').style.opacity = '1'; return; }
      const dataURL = cropCanvas(canvas, 10);
      closeDrawUI();

      // 그리기 판이 완전히 스르륵 내려가고 난 후(0.4초 대기) 우주선 발사
      setTimeout(() => {
        launchWish(dataURL);
      }, 400);
    });

    function launchWish(imgSrc) {
      const color = PHYSICS.COLOR_PALETTE[Math.floor(Math.random() * PHYSICS.COLOR_PALETTE.length)];
      const shipId = Math.floor(Math.random() * 3) + 1;
      const data = { img: imgSrc, color, shipId };

      if (allWishes.length >= PHYSICS.MAX_WISHES) {
        const oldest = allWishes.shift();
        oldest.departing = true;
        oldest.el.classList.add('departing');
        setTimeout(() => { try { oldest.el.remove(); } catch (e) { } }, 2200);
      }

      const target = getBestTarget();
      spawnCard(data, target.x, target.y);
    }

    function spawnCard(data, finalX, finalY) {
      const card = document.createElement('div');
      card.className = 'wish-wrap';

      card.innerHTML = `
        <div class="bubble" style="border: 3px solid ${data.color}">
          <img src="${data.img}">
          <div class="tail" style="border-top: 15px solid ${data.color}"></div>
        </div>
        <div class="ship" style="background-image: url('assets/ship${data.shipId}_bg.png')">
          <div class="thruster left" style="background: radial-gradient(circle, #fff 20%, ${data.color} 70%)"></div>
          <div class="thruster right" style="background: radial-gradient(circle, #fff 20%, ${data.color} 70%)"></div>
        </div>
      `;

      scene.appendChild(card);

      const w = {
        el: card,
        x: window.innerWidth / 2,
        y: window.innerHeight * 0.35, // 중앙보다 살짝 위에서 등장시켜서 밑부분 버튼과 안 겹치게
        vx: 0, vy: 0,
        targetX: finalX,
        targetY: finalY,
        phase: Math.random() * Math.PI * 2,
        scale: 2.2, // 초기 스케일 2.2배 크게 시작
        targetScale: 2.2,
        dragging: false,
        phototime: true, // 초기 멈춤 상태
        departing: false
      };

      allWishes.push(w);

      // 3초 후 강조 끝내고 자연스럽게 자리로 찾아가며 작아지기
      setTimeout(() => {
        if (!document.body.contains(card)) return;
        w.phototime = false;
        w.targetScale = 1; // 스케일 1로 축소 목표 설정
      }, 3000);

      attachDrag(card, w);
    }

    function attachDrag(card, w) {
      let startPX = 0, startPY = 0, startWX = 0, startWY = 0;

      function onDown(e) {
        if (isAdminMode) {
          allWishes = allWishes.filter(x => x !== w);
          w.departing = true;
          w.el.classList.add('departing');
          setTimeout(() => { try { w.el.remove(); } catch (e) { } }, 2200);
          return;
        }
        if (w.phototime || w.departing) return;

        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        startPX = cx; startPY = cy;
        startWX = w.x; startWY = w.y;

        w.dragging = true;
        w.vx = 0; w.vy = 0;
        e.stopPropagation();
      }

      function onMove(e) {
        if (!w.dragging) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;

        w.x = startWX + (cx - startPX);
        w.y = startWY + (cy - startPY);

        allWishes.forEach(other => {
          if (other === w || other.dragging || other.departing || other.phototime) return;
          const odx = other.x - w.x, ody = other.y - w.y;
          const distSq = odx * odx + ody * ody;
          if (distSq < 300 * 300 && distSq > 0.1) {
            const dist = Math.sqrt(distSq);
            const push = (300 - dist) * 0.05;
            other.vx += (odx / dist) * push;
            other.vy += (ody / dist) * push;
          }
        });
      }

      function onUp() {
        if (!w.dragging) return;
        w.dragging = false;
        w.targetX = w.x;
        w.targetY = w.y;
      }

      card.addEventListener('mousedown', onDown, { passive: false });
      card.addEventListener('touchstart', onDown, { passive: true });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('mouseup', onUp);
      window.addEventListener('touchend', onUp);
    }

    let adminClicks = 0, adminTimer, isAdminMode = false;
    document.getElementById('admin-secret-zone').addEventListener('click', () => {
      adminClicks++; clearTimeout(adminTimer);
      adminTimer = setTimeout(() => adminClicks = 0, 2000);
      if (adminClicks >= 5) {
        isAdminMode = !isAdminMode; adminClicks = 0;
        document.body.classList.toggle('admin-mode', isAdminMode);
      }
    });
  </script>
</body>
